<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyway Media · Google Ads (Protected)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --ink: #0a0a0a;
    --ink-2: #1d1d1f;
    --muted: #6e6e73;
    --muted-2: #86868b;
    --line: #e5e5e7;
    --line-2: #d2d2d7;
    --accent: #5e5ce6;
    --accent-tint: #eeedfc;
    --bad: #ff3b30;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01', 'cv11';
  }
  .card {
    background: var(--card);
    padding: 40px 44px 36px;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.08);
    border: 1px solid var(--line);
  }
  .logo { width: 180px; margin-bottom: 28px; display: block; }
  h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    font-size: 22px;
    color: var(--ink);
    margin: 0 0 10px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .label {
    font-size: 11px;
    color: var(--muted-2);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 500;
  }
  p.desc {
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.55;
    margin: 0 0 22px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line-2);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    color: var(--ink);
    background: var(--card);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-tint);
  }
  button {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    letter-spacing: -0.01em;
  }
  button:hover { background: #4f4dd9; }
  button:active { transform: scale(0.99); }
  button:disabled { background: var(--muted-2); cursor: not-allowed; }
  .err {
    color: var(--bad);
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .hint {
    color: var(--muted);
    font-size: 12px;
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    text-align: center;
    line-height: 1.6;
  }
  .hint a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .hint a:hover { text-decoration: underline; }
  .auto-unlock {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 30px 0;
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    );
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, cipher);
    return new TextDecoder().decode(decrypted);
  }

  function renderDecrypted(html) {
    document.open();
    document.write(html);
    document.close();
  }

  async function unlockWithPassword(password, fromSession) {
    try {
      const html = await tryDecrypt(password);
      // Store in sessionStorage so the partner dashboard auto-unlocks
      try { sessionStorage.setItem(SESSION_KEY, password); } catch(e) {}
      renderDecrypted(html);
      return true;
    } catch (e) {
      if (fromSession) {
        // Session password is stale or wrong — clear it and show prompt
        try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
        document.getElementById('auto-section').style.display = 'none';
        document.getElementById('prompt-section').style.display = 'block';
        document.getElementById('pw').focus();
      }
      return false;
    }
  }

  async function manualUnlock() {
    const pwEl = document.getElementById('pw');
    const errEl = document.getElementById('err');
    const btnEl = document.getElementById('btn');
    const password = pwEl.value;
    if (!password) return;
    errEl.textContent = '';
    btnEl.disabled = true;
    btnEl.textContent = 'Unlocking…';
    const ok = await unlockWithPassword(password, false);
    if (!ok) {
      errEl.textContent = 'Incorrect password.';
      btnEl.disabled = false;
      btnEl.textContent = 'Unlock';
      pwEl.value = '';
      pwEl.focus();
    }
  }

  // On load: try session password first, fall back to manual prompt
  (async function init() {
    let sessionPw = null;
    try { sessionPw = sessionStorage.getItem(SESSION_KEY); } catch(e) {}
    if (sessionPw) {
      document.getElementById('prompt-section').style.display = 'none';
      document.getElementById('auto-section').style.display = 'block';
      await unlockWithPassword(sessionPw, true);
    } else {
      document.getElementById('pw').focus();
    }
  })();

  document.getElementById('btn').addEventListener('click', manualUnlock);
  document.getElementById('pw').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') manualUnlock();
  });
</script>
</body>
</html>
