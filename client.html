<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Client · Skyway OS</title>
<style>
:root{
  --bg:#f5f5f7;--surface:#ffffff;--surface-raised:#fafafa;--surface-sunken:#f5f5f7;
  --ink:#0a0a0a;--ink-soft:#1d1d1f;--ink-muted:#6e6e73;--ink-subtle:#86868b;
  --line:#e5e5ea;
  --good:#34c759;--warn:#ff9f0a;--bad:#ff3b30;--info:#0a84ff;
  --accent:#5e5ce6;--accent-soft:#eeeefd;
  --google:#1a73e8;--google-soft:#e8f0fe;
  --meta:#0866ff;--meta-soft:#e6f0ff;
  --shadow-card:0 1px 2px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;margin:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}

.layout{min-height:100vh;display:flex}
.sidebar{width:240px;flex-shrink:0;padding:24px 16px;display:flex;flex-direction:column;gap:4px}
.sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 12px;margin-bottom:16px}
.sidebar-logo-mark{width:32px;height:32px;border-radius:14px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:14px}
.sidebar-logo-name{font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.2;letter-spacing:-0.01em}
.sidebar-logo-sub{font-size:11px;color:var(--ink-muted)}
.platform-switcher{display:flex;gap:4px;padding:3px;background:var(--surface);border-radius:14px;margin:0 4px 16px;border:1px solid var(--line)}
.platform-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border-radius:11px;font-size:12.5px;font-weight:500;color:var(--ink-muted);transition:all .15s ease}
.platform-pill:hover{color:var(--ink-soft);background:rgba(10,10,10,0.03)}
.platform-pill.active{background:var(--ink);color:#fff}
.platform-pill-icon{width:18px;height:18px;border-radius:6px;background:rgba(10,10,10,0.08);display:grid;place-items:center;font-size:10px;font-weight:700;letter-spacing:0;color:var(--ink-muted)}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:14px;font-size:14px;color:var(--ink-muted);transition:background-color .15s ease,color .15s ease;font-weight:500}
.nav-item:hover{background:rgba(10,10,10,0.05);color:var(--ink-soft)}
.nav-item.active{background:var(--ink);color:#fff}
.sidebar-footer{margin-top:auto;padding:24px 12px 0;font-size:11px;color:var(--ink-muted);line-height:1.5}

main{flex:1;min-width:0}
.container{max-width:1400px;margin:0 auto;padding:32px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-muted);margin-bottom:14px}
.breadcrumb a:hover{color:var(--ink-soft);text-decoration:underline}
.breadcrumb-sep{color:var(--ink-subtle)}

.client-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.client-header h1{font-size:32px;font-weight:600;letter-spacing:-0.02em;color:var(--ink-soft);line-height:1.1}
.client-header-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}

.combined-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.combined-kpi{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-card);border:1px solid rgba(229,229,234,0.6);padding:20px}
.combined-kpi-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em}
.combined-kpi-value{font-family:'SF Pro Display',sans-serif;font-size:30px;font-weight:600;letter-spacing:-0.02em;color:var(--ink-soft);margin-top:8px;line-height:1.05}
.combined-kpi-hint{font-size:12px;color:var(--ink-muted);margin-top:6px}

.section-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-label-count{background:rgba(10,10,10,0.05);color:var(--ink-muted);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:0}

.platform-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.platform-card{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-card);border:1px solid rgba(229,229,234,0.6);padding:24px;display:flex;flex-direction:column;gap:16px}
.platform-card-header{display:flex;align-items:center;justify-content:space-between;gap:12px}
.platform-card-mark{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.platform-card-mark-icon{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff}
.platform-card-mark-icon.is-google{background:var(--google)}
.platform-card-mark-icon.is-meta{background:var(--meta)}
.platform-card-id{font-size:11px;color:var(--ink-muted);font-family:'SF Mono','Monaco',monospace;margin-top:2px}
.score-cell{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:999px;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0}
.score-cell-problem{background:rgba(255,59,48,0.1);color:var(--bad);box-shadow:inset 0 0 0 1px rgba(255,59,48,0.2)}
.score-cell-needs_attention{background:rgba(255,159,10,0.1);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.2)}
.score-cell-good{background:rgba(10,132,255,0.1);color:var(--info);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.2)}
.score-cell-excellent{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}
.score-cell-tracking_gap{background:rgba(255,159,10,0.15);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.3)}
.score-cell-dormant{background:rgba(10,10,10,0.05);color:var(--ink-subtle);box-shadow:inset 0 0 0 1px rgba(10,10,10,0.1)}

.platform-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.platform-metric{padding:12px 14px;background:var(--surface-raised);border-radius:12px;border:1px solid var(--line)}
.platform-metric-label{font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.platform-metric-value{font-size:18px;font-weight:600;color:var(--ink-soft);margin-top:4px;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
.platform-metric-hint{font-size:11px;color:var(--ink-muted);margin-top:2px}

.platform-action{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 14px;background:var(--surface-raised);border-radius:12px;border:1px solid var(--line);font-size:13px;font-weight:500;color:var(--ink-soft);transition:all .15s ease}
.platform-action:hover{background:var(--surface);border-color:var(--ink-subtle)}
.platform-action-arrow{color:var(--ink-subtle);font-size:14px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;box-shadow:inset 0 0 0 1px transparent;white-space:nowrap}
.badge-good{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}
.badge-warn{background:rgba(255,159,10,0.1);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.2)}
.badge-bad{background:rgba(255,59,48,0.1);color:var(--bad);box-shadow:inset 0 0 0 1px rgba(255,59,48,0.2)}
.badge-info{background:rgba(10,132,255,0.1);color:var(--info);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.2)}
.badge-neutral{background:rgba(10,10,10,0.05);color:var(--ink-muted);box-shadow:inset 0 0 0 1px rgba(10,10,10,0.1)}
.badge-google{background:var(--google-soft);color:var(--google);box-shadow:inset 0 0 0 1px rgba(26,115,232,0.2)}
.badge-meta{background:var(--meta-soft);color:var(--meta);box-shadow:inset 0 0 0 1px rgba(8,102,255,0.2)}
.badge-accent{background:var(--accent-soft);color:var(--accent);box-shadow:inset 0 0 0 1px rgba(94,92,230,0.2)}

.next-step{padding:14px 16px;background:rgba(94,92,230,0.05);border:1px solid rgba(94,92,230,0.18);border-radius:12px;font-size:13px;color:var(--ink-soft);line-height:1.5}
.next-step-label{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:4px}

.context-card{padding:18px 20px;background:var(--surface);border-radius:14px;border:1px solid var(--line);margin-bottom:12px}
.context-card-title{font-size:13.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.context-card-body{font-size:13px;color:var(--ink-soft);line-height:1.55}

.empty-page{padding:48px 24px;text-align:center;color:var(--ink-muted);background:var(--surface);border-radius:18px;border:1px solid var(--line)}
.empty-page-icon{font-size:36px;color:var(--ink-subtle);margin-bottom:8px}

/* Ops UI (notes + recipients — combined view) */
.ops-section{margin-top:24px}
.ops-card{background:var(--surface);border-radius:18px;border:1px solid var(--line);padding:20px}
.ops-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ops-card-title{font-size:14px;font-weight:600;color:var(--ink-soft);letter-spacing:-0.01em}
.ops-card-sub{font-size:12px;color:var(--ink-muted);margin-top:2px}
.ops-unsaved-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block}
.ops-form{display:flex;gap:8px;align-items:flex-start}
.ops-input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface-raised);outline:none;transition:border-color .15s}
.ops-input:focus{border-color:var(--accent)}
.ops-textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface-raised);outline:none;min-height:64px;resize:vertical;line-height:1.5}
.ops-textarea:focus{border-color:var(--accent)}
.ops-btn{padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface-raised);color:var(--ink-soft);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.ops-btn:hover{border-color:var(--ink-subtle);color:var(--ink)}
.ops-btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.ops-btn-primary:hover{opacity:0.9}
.ops-btn-sm{padding:5px 10px;font-size:12px}
.ops-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.ops-list-empty{font-size:13px;color:var(--ink-muted);padding:14px;text-align:center;background:var(--surface-raised);border-radius:10px}
.ops-note{padding:12px 14px;background:var(--surface-raised);border-radius:12px;border:1px solid var(--line)}
.ops-note-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-muted);margin-bottom:6px;gap:8px}
.ops-note-text{font-size:13px;line-height:1.5;color:var(--ink-soft);white-space:pre-wrap;word-break:break-word}
.ops-note.is-unsaved{border-color:rgba(255,159,10,0.4);background:rgba(255,159,10,0.04)}
.ops-recipient{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-raised);border-radius:10px;border:1px solid var(--line);gap:10px}
.ops-recipient-email{font-size:13px;color:var(--ink-soft);font-family:'SF Mono','Monaco',monospace;word-break:break-all}

@media (max-width:1024px){
  .combined-kpis{grid-template-columns:repeat(2,1fr)}
  .platform-grid{grid-template-columns:1fr}
}
@media (max-width:768px){
  .sidebar{display:none}
  .container{padding:20px}
  .client-header h1{font-size:24px}
}
.campaign-row{display:grid;grid-template-columns:minmax(0,1fr) 80px 90px 80px 70px 60px;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.campaign-row:last-child{border-bottom:none}
.campaign-row-head{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-muted);padding-bottom:8px;border-bottom:1px solid var(--line)}
.campaign-name{font-size:13px;color:var(--ink-soft);font-weight:500;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.campaign-meta{font-size:11px;color:var(--ink-muted);margin-top:2px;display:flex;gap:6px;align-items:center}
.campaign-metric{font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums;text-align:right}
.campaign-metric-sub{font-size:10px;color:var(--ink-muted);margin-top:1px}
.campaigns-empty{padding:24px;text-align:center;color:var(--ink-muted);font-size:13px}
.campaigns-summary{display:flex;gap:18px;padding:14px 18px;background:rgba(8,102,255,0.06);border-radius:12px;margin-bottom:16px;font-size:12px;flex-wrap:wrap}
.campaigns-summary-item{display:flex;flex-direction:column;gap:2px}
.campaigns-summary-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--meta);opacity:0.7}
.campaigns-summary-value{font-size:14px;color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.factor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.factor{padding:16px;background:var(--surface-raised);border-radius:14px;border:1px solid var(--line);position:relative;display:flex;flex-direction:column;gap:6px;min-height:128px}
.factor-status-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.factor-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.05em}
.factor-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.factor-status-healthy{background:rgba(52,199,89,0.12);color:#1d6c3a}
.factor-status-watch{background:rgba(255,159,10,0.12);color:#a26500}
.factor-status-problem{background:rgba(255,59,48,0.12);color:#a91f1f}
.factor-status-nodata{background:rgba(10,10,10,0.05);color:var(--ink-muted)}
.factor-headline{font-size:14.5px;font-weight:500;color:var(--ink-soft);line-height:1.35;letter-spacing:-0.005em;margin-top:2px}
.factor-detail{font-size:11.5px;color:var(--ink-muted);margin-top:auto;font-variant-numeric:tabular-nums;line-height:1.45}
.factor.is-problem{background:rgba(255,59,48,0.04);border-color:rgba(255,59,48,0.18)}
.factor.is-watch{background:rgba(255,159,10,0.04);border-color:rgba(255,159,10,0.18)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;box-shadow:inset 0 0 0 1px transparent;white-space:nowrap}
.badge-good{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}
.badge-neutral{background:rgba(10,10,10,0.05);color:var(--ink-muted);box-shadow:inset 0 0 0 1px rgba(10,10,10,0.1)}
</style>
</head>

  healthy: "✓ healthy",
  watch: "⚠ watch",
  problem: "● needs attention",
  nodata: "— no data"
};
const FACTOR_LABELS = {
  cpa_trend:"Cost per lead trend",
  conversion_trend:"Lead volume trend",
  conversion_rate_trend:"Visit-to-lead rate trend",
  ctr_trend:"Click rate trend",
  cpc_trend:"Cost per click trend",
  spend_efficiency:"Cost vs target",
  budget_pacing:"Budget pacing",
  search_term_waste:"Wasted search spend",
  campaign_status:"Campaign status",
  tracking_anomaly:"Conversion tracking",
  optimization_score:"Google's optimization score"
};

function interpretFactor(key, f) {
  const label = FACTOR_LABELS[key] || key;
  if (!f || f.score == null) {
    let headline = "Not enough recent activity to measure";
    if (typeof f?.value === "string") {
      if (f.value === "no data" || f.value === "no recent activity") headline = "Not enough recent activity to measure";
      else if (f.value === "no inferable target") headline = "No target on file — can't measure";
      else if (f.value === "no inferable budget") headline = "No budget on file — can't measure";
      else if (f.value.startsWith("N/A")) headline = "Doesn't apply to this account";
    }
    return { label, status: "nodata", headline, detail: "" };
  }
  const score = f.score;
  const status = score >= 70 ? "healthy" : score >= 40 ? "watch" : "problem";
  const value = f.value;
  // Helpers
  const abs = Math.abs;
  const r = (n) => (n >= 100 ? Math.round(n) : Math.round(n * 10) / 10);
  // Per-factor interpretation
  switch (key) {
    case "cpa_trend": {
      // value = WoW % change. Positive = costs UP (bad). Negative = costs DOWN (good).
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Cost per lead is stable", detail: "" };
      let headline;
      if (v >= 20) headline = `Cost per lead jumped ${r(abs(v))}% vs last week`;
      else if (v >= 5) headline = `Cost per lead nudged up ${r(abs(v))}% vs last week`;
      else if (v <= -20) headline = `Cost per lead dropped ${r(abs(v))}% vs last week — much cheaper`;
      else if (v <= -5) headline = `Cost per lead is ${r(abs(v))}% lower than last week`;
      else headline = "Cost per lead holding steady week-over-week";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "conversion_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Lead volume is stable", detail: "" };
      let headline;
      if (v <= -50) headline = `Leads collapsed — down ${r(abs(v))}% vs last week`;
      else if (v <= -20) headline = `Leads dropped ${r(abs(v))}% vs last week`;
      else if (v <= -5) headline = `Leads down ${r(abs(v))}% vs last week`;
      else if (v >= 50) headline = `Leads surged ${r(abs(v))}% vs last week`;
      else if (v >= 5) headline = `Leads grew ${r(abs(v))}% vs last week`;
      else headline = "Lead volume holding steady week-over-week";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "conversion_rate_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Visit-to-lead rate is stable", detail: "" };
      let headline;
      if (v <= -30) headline = `Visit-to-lead rate dropped ${r(abs(v))}% — visitors stopped converting`;
      else if (v <= -5) headline = `Fewer visitors are turning into leads — down ${r(abs(v))}%`;
      else if (v >= 30) headline = `Visit-to-lead rate jumped ${r(abs(v))}%`;
      else if (v >= 5) headline = `Slightly more visitors becoming leads — up ${r(abs(v))}%`;
      else headline = "Visit-to-lead rate holding steady";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "ctr_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Click rate is stable", detail: "" };
      let headline;
      if (v <= -25) headline = `Ads are getting clicked far less — down ${r(abs(v))}%`;
      else if (v <= -5) headline = `Click rate down ${r(abs(v))}% vs last week`;
      else if (v >= 25) headline = `Click rate jumped ${r(abs(v))}%`;
      else if (v >= 5) headline = `Click rate up ${r(abs(v))}% vs last week`;
      else headline = "Click rate holding steady";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "cpc_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Click costs are stable", detail: "" };
      let headline;
      if (v >= 25) headline = `Each click costs ${r(abs(v))}% more this week`;
      else if (v >= 5) headline = `Clicks are ${r(abs(v))}% more expensive than last week`;
      else if (v <= -25) headline = `Each click is ${r(abs(v))}% cheaper this week`;
      else if (v <= -5) headline = `Clicks are ${r(abs(v))}% cheaper than last week`;
      else headline = "Click costs holding steady";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "spend_efficiency": {
      // value is a string like "7d CPA $19 vs target $7 [inferred]" or "no data"
      const s = String(value);
      const m = s.match(/\$([\d.]+) vs target \$([\d.]+)/);
      const inferred = s.includes("[inferred]");
      if (!m) return { label, status, headline: s, detail: "" };
      const cpa = Number(m[1]); const target = Number(m[2]);
      const ratio = target > 0 ? cpa / target : null;
      let headline;
      if (ratio != null && ratio >= 1.8) headline = `Last week's leads cost $${cpa} each — about ${ratio.toFixed(1)}× the target of $${target}`;
      else if (ratio != null && ratio >= 1.2) headline = `Last week's leads cost $${cpa} — above the target of $${target}`;
      else if (ratio != null && ratio <= 0.8) headline = `Last week's leads cost $${cpa} — well below target ($${target})`;
      else headline = `Last week's leads cost $${cpa} — close to the target of $${target}`;
      const detail = inferred ? "Target is estimated (no client-set target on file)" : "Using client-set target CPA";
      return { label, status, headline, detail };
    }
    case "budget_pacing": {
      // value like "MTD $2609, pacing 0.92x [inferred]"
      const s = String(value);
      const m = s.match(/MTD \$([\d.]+), pacing ([\d.]+)x/);
      const inferred = s.includes("[inferred]");
      if (!m) return { label, status, headline: s, detail: "" };
      const mtd = Number(m[1]); const pace = Number(m[2]);
      let headline;
      if (pace >= 1.5) headline = `Overspending — running ${Math.round((pace - 1) * 100)}% faster than the monthly target`;
      else if (pace >= 1.15) headline = `Slightly ahead of pace — about ${Math.round((pace - 1) * 100)}% over the monthly target rate`;
      else if (pace <= 0.5) headline = `Underspending — only ${Math.round(pace * 100)}% of where the monthly budget should be`;
      else if (pace <= 0.85) headline = `Behind pace — running at ${Math.round(pace * 100)}% of the monthly target rate`;
      else headline = `On pace — month-to-date spend tracks the monthly target`;
      const detail = `Spent $${Math.round(mtd).toLocaleString()} month-to-date${inferred ? " · budget is estimated" : ""}`;
      return { label, status, headline, detail };
    }
    case "search_term_waste": {
      // value like "72% on zero-conv ($1335/$1860)"
      const s = String(value);
      if (s.startsWith("N/A")) return { label, status: "nodata", headline: "Doesn't apply to this account", detail: "" };
      const m = s.match(/(\d+)% on zero-conv \(\$([\d.]+)\/\$([\d.]+)\)/);
      if (!m) return { label, status, headline: s, detail: "" };
      const pct = Number(m[1]); const wasted = Number(m[2]); const total = Number(m[3]);
      let headline;
      if (pct >= 70) headline = `${pct}% of last month's spend went to searches that brought zero leads`;
      else if (pct >= 50) headline = `${pct}% of search spend went to non-converting terms — high waste`;
      else if (pct >= 30) headline = `${pct}% of search spend brought no leads — moderate waste`;
      else headline = `Only ${pct}% of search spend went to non-converting terms — clean`;
      const detail = `$${wasted.toLocaleString()} of $${total.toLocaleString()} on terms with no leads (last 30 days)`;
      return { label, status, headline, detail };
    }
    case "campaign_status": {
      // value like "1 paused hi-spend / 13 total"
      const s = String(value);
      const m = s.match(/(\d+) paused hi-spend \/ (\d+) total/);
      if (!m) return { label, status, headline: s, detail: "" };
      const paused = Number(m[1]); const total = Number(m[2]);
      let headline;
      if (paused === 0) headline = total === 0 ? "No campaigns configured" : `All ${total} campaign${total === 1 ? "" : "s"} are running`;
      else if (paused === total) headline = `Everything is paused — ${paused} of ${total} campaigns`;
      else headline = `${paused} campaign${paused === 1 ? "" : "s"} paused — verify intentional`;
      return { label, status, headline, detail: `${paused} of ${total} previously-high-spend campaigns paused right now` };
    }
    case "tracking_anomaly": {
      // value like "0 bad weeks (clicks>500 & conv=0)"
      const s = String(value);
      const m = s.match(/(\d+) bad weeks/);
      if (!m) return { label, status, headline: s, detail: "" };
      const bad = Number(m[1]);
      let headline;
      if (bad === 0) headline = "Conversion tracking looks healthy";
      else if (bad === 1) headline = "One recent week looks like conversion tracking dropped";
      else headline = `${bad} recent weeks look like conversion tracking dropped — verify pixel`;
      return { label, status, headline, detail: "Flagged when a week sees 500+ clicks but zero recorded leads" };
    }
    case "optimization_score": {
      // value is "100" or similar number-as-string, or "N/A"
      const s = String(value);
      if (s === "N/A") return { label, status: "nodata", headline: "Doesn't apply to this account", detail: "" };
      const n = Number(s);
      if (isNaN(n)) return { label, status, headline: s, detail: "" };
      let headline;
      if (n >= 90) headline = `Google rates this account ${Math.round(n)}/100 — well-optimized`;
      else if (n >= 70) headline = `Google rates this account ${Math.round(n)}/100 — good, room to tune`;
      else if (n >= 50) headline = `Google rates this account ${Math.round(n)}/100 — has open recommendations`;
      else headline = `Google rates this account ${Math.round(n)}/100 — many open recommendations`;
      return { label, status, headline, detail: "From Google Ads' built-in optimization score" };
    }
    default:
      return { label, status, headline: String(value ?? ""), detail: "" };
  }
}

function renderGoogleFactorsHTML(googleId) {
  const entry = GOOGLE_FACTOR_DATA[googleId];
  if (!entry || !entry.factor_inputs) return "";
  const factors = entry.factor_inputs;
  // Order keys: problem first, then watch, then healthy/nodata. Within each group, keep declared order.
  const FACTOR_ORDER = ["cpa_trend","conversion_trend","ctr_trend","cpc_trend","conversion_rate_trend","spend_efficiency","budget_pacing","search_term_waste","campaign_status","tracking_anomaly","optimization_score"];
  const interpreted = FACTOR_ORDER.filter(k => factors[k] !== undefined).map(k => ({ key: k, ...interpretFactor(k, factors[k]) }));
  const priority = { problem: 0, watch: 1, healthy: 2, nodata: 3 };
  interpreted.sort((a, b) => priority[a.status] - priority[b.status]);
  if (!interpreted.length) return "";
  const cards = interpreted.map(f => {
    const cls = f.status === "problem" ? "factor is-problem" : (f.status === "watch" ? "factor is-watch" : "factor");
    return `<div class="${cls}">
      <div class="factor-status-row">
        <span class="factor-label">${esc(f.label)}</span>
        <span class="factor-status factor-status-${f.status}">${STATUS_BADGE[f.status]}</span>
      </div>
      <div class="factor-headline">${esc(f.headline)}</div>
      ${f.detail ? `<div class="factor-detail">${esc(f.detail)}</div>` : ""}
    </div>`;
  }).join("");
  return `<div class="section-label">Google account diagnostic <span style="background:rgba(10,10,10,0.05);color:var(--ink-muted);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;margin-left:8px">11 factors · plain English</span></div>
<div class="factor-grid">${cards}</div>`;
}

  html += '<div class="ops-card-header"><div><div class="ops-card-title">Notes about ' + esc(client.display_name) + '</div><div class="ops-card-sub">Saved instantly to your browser. Notes you add on either platform\'s drill-down also show up here.</div></div></div>';
  html += '<div class="ops-form"><textarea class="ops-textarea" id="note-input" placeholder="Cross-platform note (applies to both Google and Meta sides)..."></textarea></div>';
  html += '<div style="display:flex;gap:8px;margin-top:10px"><button class="ops-btn ops-btn-primary" id="note-add-btn">Add note</button><button class="ops-btn" id="note-clear-btn">Clear</button></div>';
  html += '<div class="ops-list" id="notes-list"></div>';
  html += '</div>';

  // Recipients (combined)
  html += '<div class="section-label">Report recipients <span class="section-label-count" id="recipients-count">0</span></div>';
  html += '<div class="ops-card">';
  html += '<div class="ops-card-header"><div><div class="ops-card-title">Who gets reports for ' + esc(client.display_name) + '</div><div class="ops-card-sub">Cross-platform list. Future weekly-report send pipeline will use this for the merged client report.</div></div></div>';
  html += '<div class="ops-form"><input type="email" class="ops-input" id="recipient-input" placeholder="client@example.com" /><button class="ops-btn ops-btn-primary" id="recipient-add-btn">Add</button></div>';
  html += '<div class="ops-list" id="recipients-list"></div>';
  html += '</div>';

  root.innerHTML = html;
  mountOps();
}

// ============= Ops module (notes + recipients) =============
// Reads/writes the SAME localStorage keys as account.html / meta-account.html
// but unions across BOTH the Google account_id AND the Meta account_id, so
// notes added on either platform's drill-down show up here too.
const SKY_NOTES_KEY = "skyway.notes.v1";
const SKY_RECIPIENTS_KEY = "skyway.recipients.v1";

function skyLoad(key){try{return JSON.parse(localStorage.getItem(key)||"[]");}catch(e){return[];}}
function skySave(key,arr){try{localStorage.setItem(key,JSON.stringify(arr));}catch(e){}}
function skyToast(msg){let t=document.getElementById("ops-toast");if(!t){t=document.createElement("div");t.id="ops-toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);padding:12px 18px;background:#0a0a0a;color:#fff;border-radius:12px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .2s;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.2)";document.body.appendChild(t);}t.textContent=msg;t.style.opacity="1";t.style.transform="translateX(-50%) translateY(0)";clearTimeout(window._skyToastTimer);window._skyToastTimer=setTimeout(()=>{t.style.opacity="0";t.style.transform="translateX(-50%) translateY(10px)";},2200);}
function skyFmtTime(iso){try{const d=new Date(iso);const opts={month:"short",day:"numeric",hour:"numeric",minute:"2-digit"};return d.toLocaleString(undefined,opts);}catch(e){return iso;}}

function mountOps(){
  if (!client) return;
  const gId = client.google.id, mId = client.meta.id;

  function renderNotes(){
    const all = skyLoad(SKY_NOTES_KEY);
    const mine = all.filter(n => (n.account_id === gId && n.platform === "google") || (n.account_id === mId && n.platform === "meta"));
    mine.sort((a,b) => (b.created_at || "").localeCompare(a.created_at || ""));
    document.getElementById("notes-count").textContent = String(mine.length);
    const listEl = document.getElementById("notes-list");
    if (mine.length === 0){ listEl.innerHTML = '<div class="ops-list-empty">No notes yet. Add one above.</div>'; return; }
    listEl.innerHTML = mine.map(n => {
      const platBadge = n.platform === "meta" ? '<span class="badge badge-meta" style="font-size:10px">Meta</span>' : '<span class="badge badge-google" style="font-size:10px">Google</span>';
      return '<div class="ops-note' + (n.synced ? "" : " is-unsaved") + '">' +
        '<div class="ops-note-meta"><div style="display:flex;align-items:center;gap:6px">' +
        (n.synced ? "" : '<span class="ops-unsaved-dot" title="Not yet on Drive"></span>') +
        '<span>' + esc(skyFmtTime(n.created_at)) + '</span>' + platBadge + '</div>' +
        '<button class="ops-btn ops-btn-sm" data-note-del="' + esc(n.id) + '" style="color:var(--bad)">Delete</button></div>' +
        '<div class="ops-note-text">' + esc(n.text) + '</div></div>';
    }).join("");
    listEl.querySelectorAll("[data-note-del]").forEach(btn => btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-note-del");
      skySave(SKY_NOTES_KEY, skyLoad(SKY_NOTES_KEY).filter(n => n.id !== id));
      renderNotes();
      skyToast("Note deleted");
    }));
  }
  document.getElementById("note-add-btn").addEventListener("click", () => {
    const inp = document.getElementById("note-input");
    const text = (inp.value || "").trim();
    if (!text){ inp.focus(); return; }
    const arr = skyLoad(SKY_NOTES_KEY);
    // Cross-platform notes are stored on the Google side by convention; they
    // show up on both per-platform drill-downs too once we extend those to
    // also fold in cross-platform notes (future). For now: attach to Google id.
    arr.push({
      id: "note_" + Date.now() + "_" + Math.random().toString(36).slice(2,8),
      account_id: gId,
      platform: "google",
      account_name: client.display_name,
      text: text,
      created_at: new Date().toISOString(),
      created_by: "Aaron Pilk",
      cross_platform: true,
      synced: false
    });
    skySave(SKY_NOTES_KEY, arr);
    inp.value = "";
    renderNotes();
    skyToast("Note saved locally · sync from Settings");
  });
  document.getElementById("note-clear-btn").addEventListener("click", () => { document.getElementById("note-input").value = ""; });
  renderNotes();

  function renderRecipients(){
    const all = skyLoad(SKY_RECIPIENTS_KEY);
    // Merge entries for BOTH the Google id and Meta id (dedupe)
    const merged = new Set();
    let anyUnsaved = false;
    all.forEach(r => {
      if ((r.account_id === gId && r.platform === "google") || (r.account_id === mId && r.platform === "meta")){
        (r.recipients || []).forEach(e => merged.add(e));
        if (r.synced === false) anyUnsaved = true;
      }
    });
    const emails = Array.from(merged);
    document.getElementById("recipients-count").textContent = String(emails.length);
    const listEl = document.getElementById("recipients-list");
    if (emails.length === 0){ listEl.innerHTML = '<div class="ops-list-empty">No recipients on file. Add one above.</div>'; return; }
    listEl.innerHTML = emails.map(em => '<div class="ops-recipient' + (anyUnsaved ? " is-unsaved" : "") + '"><span class="ops-recipient-email">' + (anyUnsaved ? '<span class="ops-unsaved-dot"></span> ' : '') + esc(em) + '</span><button class="ops-btn ops-btn-sm" data-rcpt-del="' + esc(em) + '" style="color:var(--bad)">Remove</button></div>').join("");
    listEl.querySelectorAll("[data-rcpt-del]").forEach(btn => btn.addEventListener("click", () => {
      const em = btn.getAttribute("data-rcpt-del");
      const arr2 = skyLoad(SKY_RECIPIENTS_KEY);
      arr2.forEach(r => {
        if ((r.account_id === gId && r.platform === "google") || (r.account_id === mId && r.platform === "meta")){
          r.recipients = (r.recipients || []).filter(e => e !== em);
          r.updated_at = new Date().toISOString();
          r.synced = false;
        }
      });
      skySave(SKY_RECIPIENTS_KEY, arr2.filter(r => !((r.account_id === gId || r.account_id === mId) && (!r.recipients || r.recipients.length === 0))));
      renderRecipients();
      skyToast("Recipient removed");
    }));
  }
  function addRecipient(){
    const inp = document.getElementById("recipient-input");
    const em = (inp.value || "").trim().toLowerCase();
    if (!em){ inp.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){ skyToast("That doesn't look like a valid email"); return; }
    // Add to the Google-side entry by convention (cross-platform list); the
    // per-platform views also see it because they read by their own id.
    const arr = skyLoad(SKY_RECIPIENTS_KEY);
    let entry = arr.find(r => r.account_id === gId && r.platform === "google");
    if (!entry){
      entry = { account_id: gId, platform: "google", account_name: client.display_name, recipients: [], updated_at: new Date().toISOString(), synced: false, cross_platform: true };
      arr.push(entry);
    }
    if (!entry.recipients.includes(em)){
      entry.recipients.push(em);
      entry.updated_at = new Date().toISOString();
      entry.synced = false;
    }
    skySave(SKY_RECIPIENTS_KEY, arr);
    inp.value = "";
    renderRecipients();
    skyToast("Recipient added locally · sync from Settings");
  }
  document.getElementById("recipient-add-btn").addEventListener("click", addRecipient);
  document.getElementById("recipient-input").addEventListener("keydown", e => { if (e.key === "Enter") addRecipient(); });
  renderRecipients();
}

renderClient();
</script>
<script>
// Platform context — adjust sidebar pills/links based on last-visited platform.
(function applyPlatformContext(){
  try{
    const ref = (document.referrer || "").toLowerCase();
    const fromMeta = ref.indexOf("/meta.html") >= 0 || ref.indexOf("/meta-accounts.html") >= 0 || ref.indexOf("/meta-account.html") >= 0;
    const fromGoogle = ref.indexOf("/google.html") >= 0 || ref.indexOf("/accounts.html") >= 0 || ref.indexOf("/account.html") >= 0;
    let stored = null;
    try { stored = localStorage.getItem("skyway.platform_context"); } catch (e2) {}
    const ctx = fromMeta ? "meta" : fromGoogle ? "google" : (stored || "google");
    try { localStorage.setItem("skyway.platform_context", ctx); } catch (e2) {}
    document.querySelectorAll(".platform-pill").forEach(p => {
      const isMeta = (p.getAttribute("href") || "").indexOf("meta") >= 0;
      p.classList.toggle("active", isMeta === (ctx === "meta"));
    });
    if (ctx === "meta"){
      const al = document.querySelector('.nav-item[href="accounts.html"]');
      if (al) al.setAttribute("href", "meta-accounts.html");
      const ol = document.querySelector('.nav-item[href="google.html"]');
      if (ol) ol.setAttribute("href", "meta.html");
      const bcBack = document.getElementById("bc-back");
      if (bcBack) bcBack.setAttribute("href", "meta-accounts.html");
    }
  }catch(e){}
})();
</script>
