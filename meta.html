<style>
  * { box-sizing: border-box; }
  body { font-family: 'Jost', system-ui, -apple-system, sans-serif; background: #F4F1EA; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; -webkit-font-smoothing: antialiased; }
  .card { background: white; padding: 36px 40px; border-radius: 12px; max-width: 420px; width: 100%; box-shadow: 0 1px 3px rgba(15,24,66,0.04), 0 8px 24px rgba(15,24,66,0.08); }
  .logo { width: 220px; margin-bottom: 24px; display: block; }
  h1 { font-family: 'Libre Baskerville', Georgia, serif; font-size: 22px; color: #0F1842; margin: 0 0 8px; font-weight: 400; }
  .label { font-size: 11px; color: #5DCAA5; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; font-weight: 500; }
  p.desc { color: #475569; font-size: 13px; line-height: 1.5; margin: 0 0 20px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid #E5E7EB; border-radius: 6px; font-family: inherit; font-size: 14px; outline: none; color: #0F1842; }
  input:focus { border-color: #1E3A8A; box-shadow: 0 0 0 3px rgba(30,58,138,0.12); }
  button { width: 100%; margin-top: 12px; padding: 11px; background: #1E3A8A; color: white; border: none; border-radius: 6px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  button:hover { background: #0F1842; }
  button:disabled { background: #94A3B8; cursor: not-allowed; }
  .err { color: #C92A2A; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .hint { color: #94A3B8; font-size: 11px; margin-top: 24px; padding-top: 16px; border-top: 1px solid #E5E7EB; text-align: center; line-height: 1.6; }
  .hint a { color: #1E3A8A; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
  .auto-unlock { text-align: center; color: #64748B; font-size: 14px; padding: 30px 0; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #E5E7EB; border-top-color: #1E3A8A; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

  const SALT_B64 = "SBcD/QtHYxxHW+Q0eviEQQ==";
  const IV_B64 = "PeM8ui4yxJPJsNEE";
  const SESSION_KEY = "skyway_dash_pw";

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function tryDecrypt(password) {
    const salt = b64ToBytes(SALT_B64);
    const iv = b64ToBytes(IV_B64);
    const cipher = b64ToBytes(CIPHER_B64);
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false, ['decrypt']
    );
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, cipher);
    return new TextDecoder().decode(decrypted);
  }

  function renderDecrypted(html) {
    document.open();
    document.write(html);
    document.close();
  }

  async function unlockWithPassword(password, fromSession) {
    try {
      const html = await tryDecrypt(password);
      // Store in sessionStorage so the partner dashboard auto-unlocks
      try { sessionStorage.setItem(SESSION_KEY, password); } catch(e) {}
      renderDecrypted(html);
      return true;
    } catch (e) {
      if (fromSession) {
        // Session password is stale or wrong — clear it and show prompt
        try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
        document.getElementById('auto-section').style.display = 'none';
        document.getElementById('prompt-section').style.display = 'block';
        document.getElementById('pw').focus();
      }
      return false;
    }
  }

  async function manualUnlock() {
    const pwEl = document.getElementById('pw');
    const errEl = document.getElementById('err');
    const btnEl = document.getElementById('btn');
    const password = pwEl.value;
    if (!password) return;
    errEl.textContent = '';
    btnEl.disabled = true;
    btnEl.textContent = 'Unlocking…';
    const ok = await unlockWithPassword(password, false);
    if (!ok) {
      errEl.textContent = 'Incorrect password.';
      btnEl.disabled = false;
      btnEl.textContent = 'Unlock';
      pwEl.value = '';
      pwEl.focus();
    }
  }

  // On load: try session password first, fall back to manual prompt
  (async function init() {
    let sessionPw = null;
    try { sessionPw = sessionStorage.getItem(SESSION_KEY); } catch(e) {}
    if (sessionPw) {
      document.getElementById('prompt-section').style.display = 'none';
      document.getElementById('auto-section').style.display = 'block';
      await unlockWithPassword(sessionPw, true);
    } else {
      document.getElementById('pw').focus();
    }
  })();

  document.getElementById('btn').addEventListener('click', manualUnlock);
  document.getElementById('pw').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') manualUnlock();
  });
</script>
