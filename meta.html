  button:disabled { background: #94A3B8; cursor: not-allowed; }
  .err { color: #C92A2A; font-size: 13px; margin-top: 12px; min-height: 18px; }

  const SALT_B64 = "nclA4v/i5bN0zoOcuyGQCA==";

    const pwEl = document.getElementById('pw'); const errEl = document.getElementById('err'); const btnEl = document.getElementById('btn');
