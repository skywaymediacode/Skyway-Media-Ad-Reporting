<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'">

<title>Meta Account · Skyway OS</title>
<style>
:root{
  --bg:#f5f5f7;--surface:#ffffff;--surface-raised:#fafafa;--surface-sunken:#f5f5f7;
  --ink:#0a0a0a;--ink-soft:#1d1d1f;--ink-muted:#6e6e73;--ink-subtle:#86868b;
  --line:#e5e5ea;
  --good:#34c759;--warn:#ff9f0a;--bad:#ff3b30;--info:#0a84ff;
  --accent:#5e5ce6;--accent-soft:#eeeefd;
  --meta:#0866ff;--meta-soft:#e6f0ff;
  --shadow-card:0 1px 2px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;margin:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}

.layout{min-height:100vh;display:flex}

.sidebar{width:240px;flex-shrink:0;padding:24px 16px;display:flex;flex-direction:column;gap:4px}
.sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 12px;margin-bottom:16px}
.sidebar-logo-mark{width:32px;height:32px;border-radius:14px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:14px}
.sidebar-logo-name{font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.2;letter-spacing:-0.01em}
.sidebar-logo-sub{font-size:11px;color:var(--ink-muted)}

.platform-switcher{display:flex;gap:4px;padding:3px;background:var(--surface);border-radius:14px;margin:0 4px 16px;border:1px solid var(--line)}
.platform-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border-radius:11px;font-size:12.5px;font-weight:500;color:var(--ink-muted);transition:all .15s ease}
.platform-pill:hover{color:var(--ink-soft);background:rgba(10,10,10,0.03)}
.platform-pill.active{background:var(--ink);color:#fff}
.platform-pill-icon{width:18px;height:18px;border-radius:6px;background:rgba(10,10,10,0.08);display:grid;place-items:center;font-size:10px;font-weight:700;letter-spacing:0;color:var(--ink-muted)}
.platform-pill.active .platform-pill-icon{background:rgba(255,255,255,0.18);color:#fff}

.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:14px;font-size:14px;color:var(--ink-muted);transition:background-color .15s ease,color .15s ease;font-weight:500}
.nav-item:hover{background:rgba(10,10,10,0.05);color:var(--ink-soft)}
.nav-item.active{background:var(--ink);color:#fff}
.nav-item-phase{font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:6px;background:rgba(10,10,10,0.05);color:var(--ink-muted)}
.nav-item.active .nav-item-phase{background:rgba(255,255,255,0.15);color:#fff}
.sidebar-footer{margin-top:auto;padding:24px 12px 0;font-size:11px;color:var(--ink-muted);line-height:1.5}

main{flex:1;min-width:0}
.container{max-width:1400px;margin:0 auto;padding:32px}

.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-muted);margin-bottom:14px}
.breadcrumb a:hover{color:var(--ink-soft);text-decoration:underline}
.breadcrumb-sep{color:var(--ink-subtle)}

.acct-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.acct-header-left{flex:1;min-width:0}
.acct-header h1{font-size:28px;font-weight:600;letter-spacing:-0.02em;color:var(--ink-soft);line-height:1.1}
.acct-header-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.acct-header-id{font-size:12px;color:var(--ink-muted);font-family:'SF Mono','Monaco',monospace}
.acct-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0}

.window-selector{display:inline-flex;gap:2px;padding:3px;background:var(--surface-sunken);border-radius:999px;border:1px solid var(--line)}
.window-pill{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;color:var(--ink-muted);transition:all .15s ease;background:transparent}
.window-pill:hover{color:var(--ink-soft)}
.window-pill.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,0.06)}

.card{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-card);border:1px solid rgba(229,229,234,0.6);padding:20px}

.section-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin:24px 0 12px}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{padding:20px}
.kpi-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em}
.kpi-label-window{color:var(--ink-subtle);font-weight:500}
.kpi-value{font-family:'SF Pro Display',sans-serif;font-size:28px;font-weight:600;letter-spacing:-0.02em;color:var(--ink-soft);margin-top:6px;line-height:1.05}
.kpi-hint{font-size:12px;color:var(--ink-muted);margin-top:6px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;box-shadow:inset 0 0 0 1px transparent;white-space:nowrap}
.badge-good{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}
.badge-warn{background:rgba(255,159,10,0.1);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.2)}
.badge-bad{background:rgba(255,59,48,0.1);color:var(--bad);box-shadow:inset 0 0 0 1px rgba(255,59,48,0.2)}
.badge-info{background:rgba(10,132,255,0.1);color:var(--info);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.2)}
.badge-neutral{background:rgba(10,10,10,0.05);color:var(--ink-muted);box-shadow:inset 0 0 0 1px rgba(10,10,10,0.1)}
.badge-meta{background:var(--meta-soft);color:var(--meta);box-shadow:inset 0 0 0 1px rgba(8,102,255,0.2)}

.score-cell{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:999px;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums}
.score-cell-problem{background:rgba(255,59,48,0.1);color:var(--bad);box-shadow:inset 0 0 0 1px rgba(255,59,48,0.2)}
.score-cell-needs_attention{background:rgba(255,159,10,0.1);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.2)}
.score-cell-good{background:rgba(10,132,255,0.1);color:var(--info);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.2)}
.score-cell-excellent{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}
.score-cell-tracking_gap{background:rgba(255,159,10,0.15);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.3)}
.score-cell-dormant{background:rgba(10,10,10,0.05);color:var(--ink-subtle);box-shadow:inset 0 0 0 1px rgba(10,10,10,0.1)}

.quick-action-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--line);font-size:13px;color:var(--ink-soft);width:100%;text-align:left;transition:all .15s ease;margin-bottom:8px}
.campaign-row{display:grid;grid-template-columns:minmax(0,1fr) 80px 90px 80px 70px 60px;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
.campaign-row:last-child{border-bottom:none}
.campaign-row-head{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-muted);padding-bottom:8px;border-bottom:1px solid var(--line)}
.campaign-name{font-size:13px;color:var(--ink-soft);font-weight:500;line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.campaign-meta{font-size:11px;color:var(--ink-muted);margin-top:2px;display:flex;gap:6px;align-items:center}
.campaign-metric{font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums;text-align:right}
.campaign-metric-sub{font-size:10px;color:var(--ink-muted);margin-top:1px}
.campaigns-empty{padding:24px;text-align:center;color:var(--ink-muted);font-size:13px}
.campaigns-summary{display:flex;gap:18px;padding:14px 18px;background:var(--meta-soft);border-radius:12px;margin-bottom:16px;font-size:12px}
.campaigns-summary-item{display:flex;flex-direction:column;gap:2px}
.campaigns-summary-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--meta);opacity:0.7}
.campaigns-summary-value{font-size:14px;color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
.campaign-details{border-bottom:1px solid var(--line)}
.campaign-details:last-of-type{border-bottom:none}
.campaign-details>summary{display:grid;grid-template-columns:minmax(0,1fr) 80px 90px 80px 70px 60px;gap:14px;align-items:center;padding:12px 0;cursor:pointer;list-style:none}
.campaign-details>summary::-webkit-details-marker{display:none}
.campaign-details>summary::marker{content:""}
.campaign-details>summary:hover{background:rgba(10,10,10,0.015)}
.campaign-details[open]>summary{border-bottom:1px solid var(--line);margin-bottom:12px}
.campaign-name-chevron{display:inline-block;color:var(--ink-subtle);margin-right:6px;font-size:10px;transition:transform .15s ease;width:8px}
.campaign-details[open] .campaign-name-chevron{transform:rotate(90deg)}
.campaign-ads-body{padding:0 0 16px 0}
.adset-group{margin-bottom:12px;padding:12px 14px;background:rgba(8,102,255,0.03);border-radius:10px;border-left:2px solid var(--meta)}
.adset-group:last-child{margin-bottom:0}
.adset-header{font-size:11px;font-weight:600;color:var(--meta);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.adset-header-status{font-size:10px;font-weight:500;color:var(--ink-muted);background:rgba(10,10,10,0.05);padding:1px 6px;border-radius:6px}
.ad-row{padding:10px 0;border-top:1px solid rgba(8,102,255,0.08)}
.ad-row:first-of-type{border-top:none;padding-top:2px}
.ad-row-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ad-name{font-size:12.5px;color:var(--ink-soft);font-weight:500}
.ad-name-status{font-size:10px;color:var(--ink-muted);font-weight:400;margin-left:6px}
.ad-creative{color:var(--ink-muted);font-style:italic;margin-top:4px;line-height:1.45;font-size:11.5px}
.ad-metrics{margin-top:6px;font-size:11px;color:var(--ink-muted);font-variant-numeric:tabular-nums;display:flex;gap:10px;flex-wrap:wrap}
.ad-metrics-item{display:inline-flex;gap:3px}
.ad-metrics-item strong{color:var(--ink-soft);font-weight:600}
.quick-action-btn:hover{background:var(--surface-raised);border-color:var(--ink-subtle)}
.quick-action-arrow{color:var(--ink-subtle);font-size:14px}

.empty-section{padding:40px 24px;text-align:center;color:var(--ink-muted);font-size:13.5px;line-height:1.6}
.empty-section-icon{font-size:24px;color:var(--ink-subtle);margin-bottom:6px}

.tracking-callout{background:rgba(255,159,10,0.08);border:1px solid rgba(255,159,10,0.25);border-radius:14px;padding:14px 18px;margin-bottom:24px}
.tracking-callout-title{font-size:14px;font-weight:600;color:#a26500;margin-bottom:4px}
.tracking-callout-body{font-size:13px;color:var(--ink-soft);line-height:1.5}

@media (max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:768px){
  .sidebar{display:none}
  .container{padding:20px}
  .acct-header h1{font-size:22px}
}


/* Notes + Recipients UI (audit response — Claude #5, #4) */
.ops-section{margin-top:24px}
.ops-card{background:var(--surface);border-radius:18px;border:1px solid var(--line);padding:20px}
.ops-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ops-card-title{font-size:14px;font-weight:600;color:var(--ink-soft);letter-spacing:-0.01em}
.ops-card-sub{font-size:12px;color:var(--ink-muted);margin-top:2px}
.ops-card-meta{font-size:11px;color:var(--ink-muted);display:flex;gap:8px;align-items:center}
.ops-unsaved-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block}
.ops-form{display:flex;gap:8px;align-items:flex-start}
.ops-input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface-raised);outline:none;transition:border-color .15s}
.ops-input:focus{border-color:var(--accent)}
.ops-textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface-raised);outline:none;min-height:64px;resize:vertical;line-height:1.5;transition:border-color .15s}
.ops-textarea:focus{border-color:var(--accent)}
.ops-btn{padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface-raised);color:var(--ink-soft);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.ops-btn:hover{border-color:var(--ink-subtle);color:var(--ink)}
.ops-btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.ops-btn-primary:hover{background:var(--accent);border-color:var(--accent);opacity:0.9;color:#fff}
.ops-btn-danger{color:var(--bad)}
.ops-btn-danger:hover{border-color:var(--bad);color:var(--bad)}
.ops-btn-sm{padding:5px 10px;font-size:12px}
.ops-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.ops-list-empty{font-size:13px;color:var(--ink-muted);padding:14px;text-align:center;background:var(--surface-raised);border-radius:10px}
.ops-note{padding:12px 14px;background:var(--surface-raised);border-radius:12px;border:1px solid var(--line)}
.ops-note-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-muted);margin-bottom:6px;gap:8px}
.ops-note-time{display:flex;align-items:center;gap:6px}
.ops-note-text{font-size:13px;line-height:1.5;color:var(--ink-soft);white-space:pre-wrap;word-break:break-word}
.ops-note.is-unsaved{border-color:rgba(255,159,10,0.4);background:rgba(255,159,10,0.04)}
.ops-recipient{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-raised);border-radius:10px;border:1px solid var(--line);gap:10px}
.ops-recipient.is-unsaved{border-color:rgba(255,159,10,0.4)}
.ops-recipient-email{font-size:13px;color:var(--ink-soft);font-family:'SF Mono','Monaco',monospace;word-break:break-all}
.ops-sync-banner{display:none;margin-top:14px;padding:10px 14px;background:rgba(255,159,10,0.08);border:1px solid rgba(255,159,10,0.25);border-radius:10px;font-size:12px;color:#a26500;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ops-sync-banner.is-active{display:flex}
.ops-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);padding:12px 18px;background:var(--ink);color:#fff;border-radius:12px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .2s;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.ops-toast.is-shown{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

function campaignRealConv(c){return (c.website_leads||0)+(c.website_purchases||0)+(c.fb_purchases||0)+(c.fb_leads||0)}
function renderCampaignsHTML(customerId){
  const list = CAMPAIGN_DATA[customerId];
  if (!list || !list.length) {

  }
  const adData = META_AD_DATA[customerId] || {};
  const totalSpend = list.reduce((s,c)=>s+(c.spend||0),0);
  const totalConv = list.reduce((s,c)=>s+campaignRealConv(c),0);
  const totalClicks = list.reduce((s,c)=>s+(c.clicks||0),0);
  const totalImpr = list.reduce((s,c)=>s+(c.impressions||0),0);
  const activeCount = list.filter(c=>c.status==="ACTIVE").length;
  const blendedCPA = totalConv > 0 ? totalSpend / totalConv : null;
  const totalAds = Object.values(adData).reduce((s,arr)=>s+arr.length,0);
  function adRealConv(a){return (a.website_leads||0)+(a.website_purchases||0)+(a.fb_purchases||0)+(a.fb_leads||0)}
  const rows = list.map(c=>{
    const conv = campaignRealConv(c);
    const cpa = conv > 0 ? (c.spend / conv) : null;
    const statusTone = CAMPAIGN_STATUS_TONE[c.status] || "neutral";
    const objective = OBJECTIVE_LABEL[c.objective] || (c.objective || "").replace(/^OUTCOME_/, "").toLowerCase();
    const editLink = `https://business.facebook.com/adsmanager/manage/adsets?act=${esc(customerId)}&selected_campaign_ids=${esc(c.id)}`;
    const convDetail = [];
    if (c.website_leads) convDetail.push(c.website_leads + " web lead" + (c.website_leads===1?"":"s"));
    if (c.fb_leads) convDetail.push(c.fb_leads + " FB lead" + (c.fb_leads===1?"":"s"));
    if (c.website_purchases) convDetail.push(c.website_purchases + " web purch");
    if (c.fb_purchases) convDetail.push(c.fb_purchases + " FB purch");
    // Ads under this campaign — grouped by ad set name
    const ads = adData[c.id] || [];
    const adsetMap = {};
    for (const a of ads) {
      const key = a.adset || "(no ad set)";
      if (!adsetMap[key]) adsetMap[key] = { name: key, status: a.adset_status, ads: [] };
      adsetMap[key].ads.push(a);
    }
    const adsetHTML = Object.values(adsetMap).map(g => {
      const adRows = g.ads.map(a => {
        const ac = adRealConv(a);
        const acpa = ac > 0 ? a.spend / ac : null;
        return `<div class="ad-row">
          <div class="ad-row-head">
            <span class="ad-name">${esc(a.ad_name)}<span class="ad-name-status">· ${esc((a.ad_status||"").toLowerCase().replace(/_/g," "))}</span></span>

            <span class="ad-metrics-item"><strong>${num(a.clicks||0)}</strong> clicks</span>
            <span class="ad-metrics-item"><strong>${((a.link_ctr||0)*100).toFixed(2)}%</strong> CTR</span>

        ${adRows}
      </div>`;
    }).join("");
    const summaryRow = `<summary>
      <div style="min-width:0">
        <div class="campaign-name" title="${esc(c.name)}"><span class="campaign-name-chevron">▶</span><a href="${editLink}" target="_blank" style="color:inherit" onclick="event.stopPropagation()">${esc(c.name)}</a></div>
        <div class="campaign-meta"><span class="badge badge-${statusTone}" style="font-size:10px">${esc((c.status||"").toLowerCase())}</span><span>${esc(objective)}</span>${ads.length ? `<span style="color:var(--ink-subtle)">·</span><span>${ads.length} ad${ads.length===1?"":"s"}</span>` : ""}</div>

      <div class="campaign-metric">${money(c.spend||0,0)}</div>
      <div class="campaign-metric">${conv > 0 ? num(conv) : "—"}<div class="campaign-metric-sub">${convDetail.length ? esc(convDetail.join(" · ")) : "no conv events"}</div></div>
      <div class="campaign-metric">${cpa != null ? money(cpa,0) : "—"}</div>
      <div class="campaign-metric">${((c.link_ctr||0)*100).toFixed(2)}%<div class="campaign-metric-sub">link CTR</div></div>
      <div class="campaign-metric">${c.cpc_link ? money(c.cpc_link,2) : "—"}<div class="campaign-metric-sub">CPC</div></div>
    </summary>`;
    if (ads.length) {
      return `<details class="campaign-details">${summaryRow}<div class="campaign-ads-body">${adsetHTML}</div></details>`;
    } else {
      return `<details class="campaign-details">${summaryRow}<div class="campaign-ads-body"><div style="padding:14px;text-align:center;color:var(--ink-muted);font-size:12px">No ad-level data available for this campaign in the last 90 days.</div></div></details>`;
    }
  }).join("");
  const summary = `<div class="campaigns-summary">
    <div class="campaigns-summary-item"><span class="campaigns-summary-label">Active</span><span class="campaigns-summary-value">${activeCount} of ${list.length}</span></div>
    <div class="campaigns-summary-item"><span class="campaigns-summary-label">Ads tracked</span><span class="campaigns-summary-value">${totalAds}</span></div>
    <div class="campaigns-summary-item"><span class="campaigns-summary-label">Spend</span><span class="campaigns-summary-value">${money(totalSpend,0)}</span></div>
    <div class="campaigns-summary-item"><span class="campaigns-summary-label">Real conv</span><span class="campaigns-summary-value">${num(totalConv)}</span></div>

    <div class="campaigns-summary-item"><span class="campaigns-summary-label">Impressions</span><span class="campaigns-summary-value">${num(totalImpr)}</span></div>
  </div>`;
  return `<div class="section-label">Campaigns <span style="background:rgba(10,10,10,0.05);color:var(--ink-muted);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;margin-left:8px">last 90 days · ${list.length} campaign${list.length===1?"":"s"} · ${totalAds} ad${totalAds===1?"":"s"} · click row to expand</span></div>
<div class="card">
  ${summary}
  <div class="campaign-row campaign-row-head"><div>Name · status · objective</div><div style="text-align:right">Spend</div><div style="text-align:right">Real conv</div><div style="text-align:right">CPA</div><div style="text-align:right">CTR</div><div style="text-align:right">CPC</div></div>
  ${rows}
</div>`;
}

    <div class="section-label">AI recommendations <span style="background:rgba(10,10,10,0.05);color:var(--ink-muted);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;margin-left:8px">V1 · diagnostic only</span></div>
    <div id="recs-container"></div>
  
    <div class="ops-section">
      <div class="section-label">Operator notes <span class="section-label-count" id="notes-count">0</span></div>
      <div class="ops-card">
        <div class="ops-card-header">
          <div>
            <div class="ops-card-title">Add a note to this account's audit trail</div>
            <div class="ops-card-sub">Saved instantly to your browser. Use "Sync to Drive" in Settings to push to the team.</div>
          </div>
        </div>

    <div class="ops-section">
      <div class="section-label">Report recipients <span class="section-label-count" id="recipients-count">0</span></div>
      <div class="ops-card">
        <div class="ops-card-header">
          <div>
            <div class="ops-card-title">Who gets this account's weekly report</div>

          </div>

        <div class="ops-form">
          <input type="email" class="ops-input" id="recipient-input" placeholder="client@example.com" />

`;

  document.querySelectorAll(".window-pill").forEach(p => {
    p.classList.toggle("active", p.dataset.window === currentWindow);
    p.addEventListener("click", () => setWindow(p.dataset.window));
  });

  renderKPIs();
  renderRecs();
}

  try { skyMountOps("meta", account.customer_id, account.account_name); }
  catch(e) { console.error("ops mount failed", e); }

function renderKPIs() {
  if (!account) return;
  const m = account.m[currentWindow] || {cost:0, conv:0, cpa:null, clicks:0, impr:0};
  const wl = WINDOW_LABELS[currentWindow];
  document.getElementById("lbl-spend").textContent = wl;
  document.getElementById("lbl-conv").textContent = wl;
  document.getElementById("lbl-cpa").textContent = wl;
  document.getElementById("kpi-spend").textContent = m.cost > 0 ? money(m.cost) : "—";
  document.getElementById("kpi-spend-hint").textContent = m.clicks > 0 ? num(m.clicks) + " clicks · " + num(m.impr) + " impr" : "No spend in window";
  document.getElementById("kpi-conv").textContent = m.conv > 0 ? num(m.conv) : "—";
  document.getElementById("kpi-cpa").textContent = m.cpa != null ? money(m.cpa, true) : "—";
}

function renderRecs() {
  const recs = DATA.recs[acctId] || [];
  const container = document.getElementById("recs-container");
  if (!container) return;
  if (recs.length === 0) {
    container.innerHTML = `
      <div class="card empty-section">
        <div class="empty-section-icon">⊙</div>
        <div><strong>No recommendations for this Meta account.</strong></div>
        <div style="margin-top:6px;font-size:12px">Either dormant (no spend in 90d) or no patterns surfaced in V1 analysis.</div>
      </div>
    `;
    return;
  }
  const KIND_LABELS = {
    "check_conversion_tracking": "Verify tracking",
    "monitor_no_action": "Monitor",
    "review_campaign_performance": "Review campaign",
    "add_negative_keyword": "Add negative",
    "pause_campaign": "Pause",
    "review_search_terms": "Review search terms",
  };
  container.innerHTML = recs.map((r, i) => {
    const riskTone = r.risk === "high" ? "bad" : r.risk === "medium" ? "warn" : "neutral";
    const confPct = Math.round((r.confidence || 0) * 100);
    return `
      <div class="card" style="padding:18px;margin-bottom:12px;border-left:3px solid ${r.kind === "monitor_no_action" ? "var(--ink-subtle)" : "var(--meta)"}">
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;align-items:center">
          <span class="badge badge-${riskTone}" style="font-size:11px">${esc(KIND_LABELS[r.kind] || r.kind.replace(/_/g," "))}</span>
          <span style="font-size:11px;color:var(--ink-muted)">confidence ${confPct}%</span>
          ${r.kind !== "monitor_no_action" ? '<span class="badge badge-neutral" style="font-size:10px">requires manual action</span>' : ""}
        </div>
        <div style="font-size:14.5px;font-weight:600;color:var(--ink-soft);letter-spacing:-0.01em;margin-bottom:8px">${esc(r.title)}</div>
        <div style="font-size:13px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px">${esc(r.reason)}</div>
        ${r.impact ? '<div style="font-size:12px;color:var(--ink-muted);margin-bottom:8px"><strong>Expected impact:</strong> ' + esc(r.impact) + '</div>' : ""}
        ${r.deep_link ? '<a href="' + esc(r.deep_link) + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:var(--meta-soft);color:var(--meta);font-size:12.5px;font-weight:500;margin-top:4px">Open in Meta ↗</a>' : ""}
      </div>
    `;
  }).join("");
}

function setWindow(w) {
  currentWindow = w;
  try { localStorage.setItem(STORAGE_KEY, w); } catch(e) {}
  document.querySelectorAll(".window-pill").forEach(p => p.classList.toggle("active", p.dataset.window === w));
  renderKPIs();
}


// ============================================================
// Notes + Recipients module (audit response — Claude #5, #4)
// Stored in localStorage keyed by ${platform}_${customer_id}.
// Each note/recipient has a `synced` bool: false = pending sync to Drive.
// Sync UX lives on settings.html — copy-prompt-to-Claude pattern.
// ============================================================
const SKY_NOTES_KEY = "skyway.notes.v1";
const SKY_RECIPIENTS_KEY = "skyway.recipients.v1";

function skyLoadAll(key) {
  try { return JSON.parse(localStorage.getItem(key) || "[]"); }
  catch(e) { return []; }
}
function skySaveAll(key, arr) {
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}
function skyFmtTime(iso) {
  try {
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const opts = sameDay
      ? { hour: "numeric", minute: "2-digit" }
      : { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" };
    return d.toLocaleString(undefined, opts);
  } catch(e) { return iso; }
}
function skyToast(msg) {
  let t = document.getElementById("ops-toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "ops-toast";
    t.className = "ops-toast";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add("is-shown");
  clearTimeout(window._skyToastTimer);
  window._skyToastTimer = setTimeout(() => t.classList.remove("is-shown"), 2200);
}

function skyMountOps(platform, customerId, accountName) {
  if (!platform || !customerId) return;

  // ---------- Notes ----------
  function renderNotes() {
    const all = skyLoadAll(SKY_NOTES_KEY);
    const mine = all.filter(n => n.account_id === customerId && n.platform === platform);
    mine.sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
    const countEl = document.getElementById("notes-count");
    if (countEl) countEl.textContent = String(mine.length);
    const listEl = document.getElementById("notes-list");
    if (!listEl) return;
    if (mine.length === 0) {
      listEl.innerHTML = '<div class="ops-list-empty">No notes yet. Add one above.</div>';
      return;
    }
    listEl.innerHTML = mine.map(n => `
      <div class="ops-note${n.synced ? "" : " is-unsaved"}">
        <div class="ops-note-meta">
          <div class="ops-note-time">
            ${n.synced ? "" : '<span class="ops-unsaved-dot" title="Not yet saved to Drive"></span>'}
            <span>${esc(skyFmtTime(n.created_at))}</span>
          </div>
          <button class="ops-btn ops-btn-sm ops-btn-danger" data-note-del="${esc(n.id)}">Delete</button>
        </div>
        <div class="ops-note-text">${esc(n.text)}</div>
      </div>
    `).join("");
    listEl.querySelectorAll("[data-note-del]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-note-del");
        const arr = skyLoadAll(SKY_NOTES_KEY);
        const next = arr.filter(n => n.id !== id);
        skySaveAll(SKY_NOTES_KEY, next);
        renderNotes();
        skyToast("Note deleted");
      });
    });
  }
  const noteInput = document.getElementById("note-input");
  const noteAdd = document.getElementById("note-add-btn");
  const noteClear = document.getElementById("note-clear-btn");
  if (noteAdd) {
    noteAdd.addEventListener("click", () => {
      const text = (noteInput.value || "").trim();
      if (!text) { noteInput.focus(); return; }
      const arr = skyLoadAll(SKY_NOTES_KEY);
      const note = {
        id: "note_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8),
        account_id: customerId,
        platform: platform,
        account_name: accountName || customerId,
        text: text,
        created_at: new Date().toISOString(),
        created_by: "Aaron Pilk",
        synced: false
      };
      arr.push(note);
      skySaveAll(SKY_NOTES_KEY, arr);
      noteInput.value = "";
      renderNotes();
      skyToast("Note saved locally · sync from Settings");
    });
  }
  if (noteClear) noteClear.addEventListener("click", () => { noteInput.value = ""; });
  renderNotes();

  // ---------- Recipients ----------
  function renderRecipients() {
    const all = skyLoadAll(SKY_RECIPIENTS_KEY);
    const mine = all.find(r => r.account_id === customerId && r.platform === platform);
    const emails = (mine && Array.isArray(mine.recipients)) ? mine.recipients : [];
    const isUnsaved = mine && mine.synced === false;
    const countEl = document.getElementById("recipients-count");
    if (countEl) countEl.textContent = String(emails.length);
    const listEl = document.getElementById("recipients-list");
    if (!listEl) return;
    if (emails.length === 0) {
      listEl.innerHTML = '<div class="ops-list-empty">No recipients on file. Add one above.</div>';
      return;
    }
    listEl.innerHTML = emails.map(em => `
      <div class="ops-recipient${isUnsaved ? " is-unsaved" : ""}">
        <span class="ops-recipient-email">
          ${isUnsaved ? '<span class="ops-unsaved-dot" title="Not yet saved to Drive"></span> ' : ""}
          ${esc(em)}
        </span>
        <button class="ops-btn ops-btn-sm ops-btn-danger" data-rcpt-del="${esc(em)}">Remove</button>
      </div>
    `).join("");
    listEl.querySelectorAll("[data-rcpt-del]").forEach(btn => {
      btn.addEventListener("click", () => {
        const em = btn.getAttribute("data-rcpt-del");
        const arr = skyLoadAll(SKY_RECIPIENTS_KEY);
        const idx = arr.findIndex(r => r.account_id === customerId && r.platform === platform);
        if (idx === -1) return;
        arr[idx].recipients = (arr[idx].recipients || []).filter(e => e !== em);
        arr[idx].updated_at = new Date().toISOString();
        arr[idx].synced = false;
        if (arr[idx].recipients.length === 0) arr.splice(idx, 1);
        skySaveAll(SKY_RECIPIENTS_KEY, arr);
        renderRecipients();
        skyToast("Recipient removed");
      });
    });
  }
  const rInput = document.getElementById("recipient-input");
  const rAdd = document.getElementById("recipient-add-btn");
  function addRecipient() {
    const em = (rInput.value || "").trim().toLowerCase();
    if (!em) { rInput.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
      skyToast("That doesn't look like a valid email");
      return;
    }
    const arr = skyLoadAll(SKY_RECIPIENTS_KEY);
    let entry = arr.find(r => r.account_id === customerId && r.platform === platform);
    if (!entry) {
      entry = {
        account_id: customerId,
        platform: platform,
        account_name: accountName || customerId,
        recipients: [],
        updated_at: new Date().toISOString(),
        synced: false
      };
      arr.push(entry);
    }
    if (!entry.recipients.includes(em)) {
      entry.recipients.push(em);
      entry.updated_at = new Date().toISOString();
      entry.synced = false;
    }
    skySaveAll(SKY_RECIPIENTS_KEY, arr);
    rInput.value = "";
    renderRecipients();
    skyToast("Recipient added locally · sync from Settings");
  }
  if (rAdd) rAdd.addEventListener("click", addRecipient);
  if (rInput) rInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addRecipient(); });
  renderRecipients();
}
</script>
