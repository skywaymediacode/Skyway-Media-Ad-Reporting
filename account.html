<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'">

<title>Account · Skyway OS</title>
<style>
:root{
  --bg:#f5f5f7;--surface:#ffffff;--surface-raised:#fafafa;--surface-sunken:#f5f5f7;
  --ink:#0a0a0a;--ink-soft:#1d1d1f;--ink-muted:#6e6e73;--ink-subtle:#86868b;
  --line:#e5e5ea;
  --good:#34c759;--warn:#ff9f0a;--bad:#ff3b30;--info:#0a84ff;
  --accent:#5e5ce6;--accent-soft:#eeeefd;
  --shadow-card:0 1px 2px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.04);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'SF Pro Text',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-size:14px;line-height:1.5}
h1,h2,h3,h4{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;margin:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

.layout{min-height:100vh;display:flex}
.sidebar{width:240px;flex-shrink:0;padding:24px 16px;display:flex;flex-direction:column;gap:4px}
.sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 12px;margin-bottom:16px}
.sidebar-logo-mark{width:32px;height:32px;border-radius:14px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:14px}
.sidebar-logo-name{font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.2;letter-spacing:-0.01em}
.sidebar-logo-sub{font-size:11px;color:var(--ink-muted)}
.platform-switcher{display:flex;gap:4px;padding:3px;background:var(--surface);border-radius:14px;margin:0 4px 16px;border:1px solid var(--line)}
.platform-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 10px;border-radius:11px;font-size:12.5px;font-weight:500;color:var(--ink-muted);transition:all .15s ease}
.platform-pill:hover{color:var(--ink-soft);background:rgba(10,10,10,0.03)}
.platform-pill.active{background:var(--ink);color:#fff}
.platform-pill-icon{width:18px;height:18px;border-radius:6px;background:rgba(10,10,10,0.08);display:grid;place-items:center;font-size:10px;font-weight:700;letter-spacing:0;color:var(--ink-muted)}
.platform-pill.active .platform-pill-icon{background:rgba(255,255,255,0.18);color:#fff}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:14px;font-size:14px;color:var(--ink-muted);transition:background-color .15s ease,color .15s ease;font-weight:500}
.nav-item:hover{background:rgba(10,10,10,0.05);color:var(--ink-soft)}
.nav-item.active{background:var(--ink);color:#fff}
.nav-item-phase{font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:6px;background:rgba(10,10,10,0.05);color:var(--ink-muted)}
.nav-item.active .nav-item-phase{background:rgba(255,255,255,0.15);color:#fff}
.sidebar-footer{margin-top:auto;padding:24px 12px 0;font-size:11px;color:var(--ink-muted);line-height:1.5}

main{flex:1;min-width:0}
.container{max-width:1400px;margin:0 auto;padding:32px}

.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-muted);margin-bottom:14px}
.breadcrumb a:hover{color:var(--ink-soft);text-decoration:underline}
.breadcrumb-sep{color:var(--ink-subtle)}

.acct-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.acct-header-left{flex:1;min-width:0}
.acct-header h1{font-size:28px;font-weight:600;letter-spacing:-0.02em;color:var(--ink-soft);line-height:1.1}
.acct-header-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.acct-header-id{font-size:12px;color:var(--ink-muted);font-family:'SF Mono','Monaco',monospace}
.acct-header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px;flex-shrink:0}

.window-selector{display:inline-flex;gap:2px;padding:3px;background:var(--surface-sunken);border-radius:999px;border:1px solid var(--line)}
.window-pill{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;color:var(--ink-muted);transition:all .15s ease;background:transparent}
.window-pill:hover{color:var(--ink-soft)}
.window-pill.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,0.06)}

.next-action-card{background:var(--accent-soft);border:1px solid rgba(94,92,230,0.2);border-radius:14px;padding:14px 18px;margin-bottom:24px;display:flex;align-items:flex-start;gap:14px}
.next-action-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;color:var(--accent);flex-shrink:0;margin-top:2px}
.next-action-text{font-size:14px;color:var(--ink-soft);font-weight:500;line-height:1.5}

.card{background:var(--surface);border-radius:18px;box-shadow:var(--shadow-card);border:1px solid rgba(229,229,234,0.6);padding:20px}

.section-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-label-count{background:rgba(10,10,10,0.05);color:var(--ink-muted);padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:0}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{padding:20px}
.kpi-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.06em}
.kpi-label-window{color:var(--ink-subtle);font-weight:500}
.kpi-value{font-family:'SF Pro Display',sans-serif;font-size:28px;font-weight:600;letter-spacing:-0.02em;color:var(--ink-soft);margin-top:6px;line-height:1.05}
.kpi-hint{font-size:12px;color:var(--ink-muted);margin-top:6px}
.kpi-hint-bad{color:var(--bad)}

.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;box-shadow:inset 0 0 0 1px transparent;white-space:nowrap}
.badge-good{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}
.badge-warn{background:rgba(255,159,10,0.1);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.2)}
.badge-bad{background:rgba(255,59,48,0.1);color:var(--bad);box-shadow:inset 0 0 0 1px rgba(255,59,48,0.2)}
.badge-info{background:rgba(10,132,255,0.1);color:var(--info);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.2)}
.badge-neutral{background:rgba(10,10,10,0.05);color:var(--ink-muted);box-shadow:inset 0 0 0 1px rgba(10,10,10,0.1)}
.badge-accent{background:var(--accent-soft);color:var(--accent);box-shadow:inset 0 0 0 1px rgba(94,92,230,0.2)}

.score-cell{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:999px;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums}
.score-cell-problem{background:rgba(255,59,48,0.1);color:var(--bad);box-shadow:inset 0 0 0 1px rgba(255,59,48,0.2)}
.score-cell-needs_attention{background:rgba(255,159,10,0.1);color:var(--warn);box-shadow:inset 0 0 0 1px rgba(255,159,10,0.2)}
.score-cell-good{background:rgba(10,132,255,0.1);color:var(--info);box-shadow:inset 0 0 0 1px rgba(10,132,255,0.2)}
.score-cell-excellent{background:rgba(52,199,89,0.1);color:var(--good);box-shadow:inset 0 0 0 1px rgba(52,199,89,0.2)}

.factor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.factor{padding:16px;background:var(--surface-raised);border-radius:14px;border:1px solid var(--line);position:relative;display:flex;flex-direction:column;gap:6px;min-height:128px}
.factor-status-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.factor-label{font-size:11px;font-weight:600;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.05em}
.factor-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px}
.factor-status-healthy{background:rgba(52,199,89,0.12);color:#1d6c3a}
.factor-status-watch{background:rgba(255,159,10,0.12);color:#a26500}
.factor-status-problem{background:rgba(255,59,48,0.12);color:#a91f1f}
.factor-status-nodata{background:rgba(10,10,10,0.05);color:var(--ink-muted)}
.factor-headline{font-size:14.5px;font-weight:500;color:var(--ink-soft);line-height:1.35;letter-spacing:-0.005em;margin-top:2px}
.factor-detail{font-size:11.5px;color:var(--ink-muted);margin-top:auto;font-variant-numeric:tabular-nums;line-height:1.45}
.factor.is-problem{background:rgba(255,59,48,0.04);border-color:rgba(255,59,48,0.18)}
.factor.is-watch{background:rgba(255,159,10,0.04);border-color:rgba(255,159,10,0.18)}

.alert-row{padding:12px 0;border-bottom:1px solid var(--line)}
.alert-row:last-child{border-bottom:none}
.alert-row-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.alert-row-headline{font-size:14px;color:var(--ink-soft);font-weight:500}
.alert-row-evidence{font-size:12px;color:var(--ink-muted);margin-top:2px}
.alert-row-action{font-size:12px;color:var(--info);margin-top:6px;font-style:italic}

.rec-card{background:var(--surface-raised);border-radius:12px;border:1px solid var(--line);padding:14px 16px;margin-bottom:10px}
.rec-card-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
.rec-card-title{font-size:14px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;letter-spacing:-0.01em}
.rec-card-reason{font-size:13px;color:var(--ink-muted);line-height:1.5;max-width:760px}
.rec-card-meta{font-size:12px;color:var(--ink-muted);margin-top:8px}
.rec-card-meta-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;font-weight:500;color:var(--ink-subtle)}

.quick-action-btn{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--line);font-size:13px;color:var(--ink-soft);width:100%;text-align:left;transition:all .15s ease;margin-bottom:8px}
.quick-action-btn:hover{background:var(--surface-raised);border-color:var(--ink-subtle)}
.quick-action-btn:last-child{margin-bottom:0}
.quick-action-arrow{color:var(--ink-subtle);font-size:14px}

.empty-section{padding:40px 24px;text-align:center;color:var(--ink-muted);font-size:13.5px;line-height:1.6}
.empty-section-icon{font-size:24px;color:var(--ink-subtle);margin-bottom:6px}

.card-header{display:flex;align-items:start;justify-content:space-between;gap:12px;margin-bottom:12px}
.card-header h2{font-size:16px;font-weight:600;color:var(--ink-soft);letter-spacing:-0.01em}
.card-header-sub{font-size:13px;color:var(--ink-muted);margin-top:2px}

.acct-not-found{text-align:center;padding:60px 24px;color:var(--ink-muted)}
.acct-not-found h2{font-size:20px;color:var(--ink-soft);margin-bottom:8px}

@media (max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .two-col{grid-template-columns:1fr}
}
@media (max-width:768px){
  .sidebar{display:none}
  .container{padding:20px}
  .acct-header h1{font-size:22px}
}


/* Notes + Recipients UI (audit response — Claude #5, #4) */
.ops-section{margin-top:24px}
.ops-card{background:var(--surface);border-radius:18px;border:1px solid var(--line);padding:20px}
.ops-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ops-card-title{font-size:14px;font-weight:600;color:var(--ink-soft);letter-spacing:-0.01em}
.ops-card-sub{font-size:12px;color:var(--ink-muted);margin-top:2px}
.ops-card-meta{font-size:11px;color:var(--ink-muted);display:flex;gap:8px;align-items:center}
.ops-unsaved-dot{width:7px;height:7px;border-radius:50%;background:var(--warn);display:inline-block}
.ops-form{display:flex;gap:8px;align-items:flex-start}
.ops-input{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface-raised);outline:none;transition:border-color .15s}
.ops-input:focus{border-color:var(--accent)}
.ops-textarea{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--surface-raised);outline:none;min-height:64px;resize:vertical;line-height:1.5;transition:border-color .15s}
.ops-textarea:focus{border-color:var(--accent)}
.ops-btn{padding:9px 14px;border-radius:10px;border:1px solid var(--line);background:var(--surface-raised);color:var(--ink-soft);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.ops-btn:hover{border-color:var(--ink-subtle);color:var(--ink)}
.ops-btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.ops-btn-primary:hover{background:var(--accent);border-color:var(--accent);opacity:0.9;color:#fff}
.ops-btn-danger{color:var(--bad)}
.ops-btn-danger:hover{border-color:var(--bad);color:var(--bad)}
.ops-btn-sm{padding:5px 10px;font-size:12px}
.ops-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.ops-list-empty{font-size:13px;color:var(--ink-muted);padding:14px;text-align:center;background:var(--surface-raised);border-radius:10px}
.ops-note{padding:12px 14px;background:var(--surface-raised);border-radius:12px;border:1px solid var(--line)}
.ops-note-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--ink-muted);margin-bottom:6px;gap:8px}
.ops-note-time{display:flex;align-items:center;gap:6px}
.ops-note-text{font-size:13px;line-height:1.5;color:var(--ink-soft);white-space:pre-wrap;word-break:break-word}
.ops-note.is-unsaved{border-color:rgba(255,159,10,0.4);background:rgba(255,159,10,0.04)}
.ops-recipient{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-raised);border-radius:10px;border:1px solid var(--line);gap:10px}
.ops-recipient.is-unsaved{border-color:rgba(255,159,10,0.4)}
.ops-recipient-email{font-size:13px;color:var(--ink-soft);font-family:'SF Mono','Monaco',monospace;word-break:break-all}
.ops-sync-banner{display:none;margin-top:14px;padding:10px 14px;background:rgba(255,159,10,0.08);border:1px solid rgba(255,159,10,0.25);border-radius:10px;font-size:12px;color:#a26500;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ops-sync-banner.is-active{display:flex}
.ops-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);padding:12px 18px;background:var(--ink);color:#fff;border-radius:12px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:all .2s;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.ops-toast.is-shown{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

const STATUS_TONE = {problem:"bad",needs_attention:"warn",good:"info",excellent:"good"};
const SEV_TONE = {critical:"bad",warning:"warn"};

// Plain-English labels — what each factor actually means in business terms.
// Kept as a separate const so the rest of the code (e.g. risk-mention summary
// at the top of the drill-down) can still resolve a label by factor key.
const FACTOR_LABELS = {
  cpa_trend:"Cost per lead trend",
  conversion_trend:"Lead volume trend",
  conversion_rate_trend:"Visit-to-lead rate trend",
  ctr_trend:"Click rate trend",
  cpc_trend:"Cost per click trend",
  spend_efficiency:"Cost vs target",
  budget_pacing:"Budget pacing",
  search_term_waste:"Wasted search spend",
  campaign_status:"Campaign status",
  tracking_anomaly:"Conversion tracking",
  optimization_score:"Google's optimization score"
};

// interpretFactor — given a factor key + the raw factor input {score, value},
// return {label, status, headline, detail}. Headline is the plain-English
// sentence we want operators (and clients) to be able to read at a glance.
// Detail is the small technical readout below it. Status drives the color.
function interpretFactor(key, f) {
  const label = FACTOR_LABELS[key] || key;
  if (!f || f.score == null) {
    let headline = "Not enough recent activity to measure";
    if (typeof f?.value === "string") {
      if (f.value === "no data" || f.value === "no recent activity") headline = "Not enough recent activity to measure";
      else if (f.value === "no inferable target") headline = "No target on file — can't measure";
      else if (f.value === "no inferable budget") headline = "No budget on file — can't measure";
      else if (f.value.startsWith("N/A")) headline = "Doesn't apply to this account";
    }
    return { label, status: "nodata", headline, detail: "" };
  }
  const score = f.score;
  const status = score >= 70 ? "healthy" : score >= 40 ? "watch" : "problem";
  const value = f.value;
  // Helpers
  const abs = Math.abs;
  const r = (n) => (n >= 100 ? Math.round(n) : Math.round(n * 10) / 10);
  // Per-factor interpretation
  switch (key) {
    case "cpa_trend": {
      // value = WoW % change. Positive = costs UP (bad). Negative = costs DOWN (good).
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Cost per lead is stable", detail: "" };
      let headline;
      if (v >= 20) headline = `Cost per lead jumped ${r(abs(v))}% vs last week`;
      else if (v >= 5) headline = `Cost per lead nudged up ${r(abs(v))}% vs last week`;
      else if (v <= -20) headline = `Cost per lead dropped ${r(abs(v))}% vs last week — much cheaper`;
      else if (v <= -5) headline = `Cost per lead is ${r(abs(v))}% lower than last week`;
      else headline = "Cost per lead holding steady week-over-week";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "conversion_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Lead volume is stable", detail: "" };
      let headline;
      if (v <= -50) headline = `Leads collapsed — down ${r(abs(v))}% vs last week`;
      else if (v <= -20) headline = `Leads dropped ${r(abs(v))}% vs last week`;
      else if (v <= -5) headline = `Leads down ${r(abs(v))}% vs last week`;
      else if (v >= 50) headline = `Leads surged ${r(abs(v))}% vs last week`;
      else if (v >= 5) headline = `Leads grew ${r(abs(v))}% vs last week`;
      else headline = "Lead volume holding steady week-over-week";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "conversion_rate_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Visit-to-lead rate is stable", detail: "" };
      let headline;
      if (v <= -30) headline = `Visit-to-lead rate dropped ${r(abs(v))}% — visitors stopped converting`;
      else if (v <= -5) headline = `Fewer visitors are turning into leads — down ${r(abs(v))}%`;
      else if (v >= 30) headline = `Visit-to-lead rate jumped ${r(abs(v))}%`;
      else if (v >= 5) headline = `Slightly more visitors becoming leads — up ${r(abs(v))}%`;
      else headline = "Visit-to-lead rate holding steady";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "ctr_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Click rate is stable", detail: "" };
      let headline;
      if (v <= -25) headline = `Ads are getting clicked far less — down ${r(abs(v))}%`;
      else if (v <= -5) headline = `Click rate down ${r(abs(v))}% vs last week`;
      else if (v >= 25) headline = `Click rate jumped ${r(abs(v))}%`;
      else if (v >= 5) headline = `Click rate up ${r(abs(v))}% vs last week`;
      else headline = "Click rate holding steady";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "cpc_trend": {
      const v = Number(value);
      if (isNaN(v)) return { label, status, headline: "Click costs are stable", detail: "" };
      let headline;
      if (v >= 25) headline = `Each click costs ${r(abs(v))}% more this week`;
      else if (v >= 5) headline = `Clicks are ${r(abs(v))}% more expensive than last week`;
      else if (v <= -25) headline = `Each click is ${r(abs(v))}% cheaper this week`;
      else if (v <= -5) headline = `Clicks are ${r(abs(v))}% cheaper than last week`;
      else headline = "Click costs holding steady";
      return { label, status, headline, detail: `${v >= 0 ? "+" : ""}${r(v)}% week-over-week` };
    }
    case "spend_efficiency": {
      // value is a string like "7d CPA $19 vs target $7 [inferred]" or "no data"
      const s = String(value);
      const m = s.match(/\$([\d.]+) vs target \$([\d.]+)/);
      const inferred = s.includes("[inferred]");
      if (!m) return { label, status, headline: s, detail: "" };
      const cpa = Number(m[1]); const target = Number(m[2]);
      const ratio = target > 0 ? cpa / target : null;
      let headline;
      if (ratio != null && ratio >= 1.8) headline = `Last week's leads cost $${cpa} each — about ${ratio.toFixed(1)}× the target of $${target}`;
      else if (ratio != null && ratio >= 1.2) headline = `Last week's leads cost $${cpa} — above the target of $${target}`;
      else if (ratio != null && ratio <= 0.8) headline = `Last week's leads cost $${cpa} — well below target ($${target})`;
      else headline = `Last week's leads cost $${cpa} — close to the target of $${target}`;
      const detail = inferred ? "Target is estimated (no client-set target on file)" : "Using client-set target CPA";
      return { label, status, headline, detail };
    }
    case "budget_pacing": {
      // value like "MTD $2609, pacing 0.92x [inferred]"
      const s = String(value);
      const m = s.match(/MTD \$([\d.]+), pacing ([\d.]+)x/);
      const inferred = s.includes("[inferred]");
      if (!m) return { label, status, headline: s, detail: "" };
      const mtd = Number(m[1]); const pace = Number(m[2]);
      let headline;
      if (pace >= 1.5) headline = `Overspending — running ${Math.round((pace - 1) * 100)}% faster than the monthly target`;
      else if (pace >= 1.15) headline = `Slightly ahead of pace — about ${Math.round((pace - 1) * 100)}% over the monthly target rate`;
      else if (pace <= 0.5) headline = `Underspending — only ${Math.round(pace * 100)}% of where the monthly budget should be`;
      else if (pace <= 0.85) headline = `Behind pace — running at ${Math.round(pace * 100)}% of the monthly target rate`;
      else headline = `On pace — month-to-date spend tracks the monthly target`;
      const detail = `Spent $${Math.round(mtd).toLocaleString()} month-to-date${inferred ? " · budget is estimated" : ""}`;
      return { label, status, headline, detail };
    }
    case "search_term_waste": {
      // value like "72% on zero-conv ($1335/$1860)"
      const s = String(value);
      if (s.startsWith("N/A")) return { label, status: "nodata", headline: "Doesn't apply to this account", detail: "" };
      const m = s.match(/(\d+)% on zero-conv \(\$([\d.]+)\/\$([\d.]+)\)/);
      if (!m) return { label, status, headline: s, detail: "" };
      const pct = Number(m[1]); const wasted = Number(m[2]); const total = Number(m[3]);
      let headline;
      if (pct >= 70) headline = `${pct}% of last month's spend went to searches that brought zero leads`;
      else if (pct >= 50) headline = `${pct}% of search spend went to non-converting terms — high waste`;
      else if (pct >= 30) headline = `${pct}% of search spend brought no leads — moderate waste`;
      else headline = `Only ${pct}% of search spend went to non-converting terms — clean`;
      const detail = `$${wasted.toLocaleString()} of $${total.toLocaleString()} on terms with no leads (last 30 days)`;
      return { label, status, headline, detail };
    }
    case "campaign_status": {
      // value like "1 paused hi-spend / 13 total"
      const s = String(value);
      const m = s.match(/(\d+) paused hi-spend \/ (\d+) total/);
      if (!m) return { label, status, headline: s, detail: "" };
      const paused = Number(m[1]); const total = Number(m[2]);
      let headline;
      if (paused === 0) headline = total === 0 ? "No campaigns configured" : `All ${total} campaign${total === 1 ? "" : "s"} are running`;
      else if (paused === total) headline = `Everything is paused — ${paused} of ${total} campaigns`;
      else headline = `${paused} campaign${paused === 1 ? "" : "s"} paused — verify intentional`;
      return { label, status, headline, detail: `${paused} of ${total} previously-high-spend campaigns paused right now` };
    }
    case "tracking_anomaly": {
      // value like "0 bad weeks (clicks>500 & conv=0)"
      const s = String(value);
      const m = s.match(/(\d+) bad weeks/);
      if (!m) return { label, status, headline: s, detail: "" };
      const bad = Number(m[1]);
      let headline;
      if (bad === 0) headline = "Conversion tracking looks healthy";
      else if (bad === 1) headline = "One recent week looks like conversion tracking dropped";
      else headline = `${bad} recent weeks look like conversion tracking dropped — verify pixel`;
      return { label, status, headline, detail: "Flagged when a week sees 500+ clicks but zero recorded leads" };
    }
    case "optimization_score": {
      // value is "100" or similar number-as-string, or "N/A"
      const s = String(value);
      if (s === "N/A") return { label, status: "nodata", headline: "Doesn't apply to this account", detail: "" };
      const n = Number(s);
      if (isNaN(n)) return { label, status, headline: s, detail: "" };
      let headline;
      if (n >= 90) headline = `Google rates this account ${Math.round(n)}/100 — well-optimized`;
      else if (n >= 70) headline = `Google rates this account ${Math.round(n)}/100 — good, room to tune`;
      else if (n >= 50) headline = `Google rates this account ${Math.round(n)}/100 — has open recommendations`;
      else headline = `Google rates this account ${Math.round(n)}/100 — many open recommendations`;
      return { label, status, headline, detail: "From Google Ads' built-in optimization score" };
    }
    default:
      return { label, status, headline: String(value ?? ""), detail: "" };
  }
}

            <a class="quick-action-btn" href="https://ads.google.com/aw/campaigns?__c=${esc(a.customer_id)}" target="_blank">
              <span>Campaigns</span>
              <span class="quick-action-arrow">↗</span>
            </a>
            <a class="quick-action-btn" href="https://ads.google.com/aw/keywords/searchterms?__c=${esc(a.customer_id)}" target="_blank">
              <span>Search-term report</span>
              <span class="quick-action-arrow">↗</span>
            </a>
            <a class="quick-action-btn" href="https://ads.google.com/aw/keywords/negative?__c=${esc(a.customer_id)}" target="_blank">
              <span>Negative keywords</span>
              <span class="quick-action-arrow">↗</span>
            </a>
            <a class="quick-action-btn" href="https://ads.google.com/aw/overview/recommendations?__c=${esc(a.customer_id)}" target="_blank">
              <span>Google's recommendations</span>
              <span class="quick-action-arrow">↗</span>
            </a>
          `}
        </div>
      </div>
    </div>

    ${accountAlerts.length > 0 ? `
      <div class="section-label">Active alerts <span class="section-label-count">${accountAlerts.length}</span></div>
      <div class="card">
        ${accountAlerts.map(al => `
          <div class="alert-row">
            <div class="alert-row-top">
              <span class="alert-row-headline">${esc(al.headline)}</span>
              <span class="badge badge-${SEV_TONE[al.severity]}">${esc(al.severity)}</span>
            </div>
            <div class="alert-row-evidence">${esc(al.evidence)}</div>
            ${al.recommended_action ? `<div class="alert-row-action">→ ${esc(al.recommended_action)}</div>` : ""}
          </div>
        `).join("")}
      </div>
    ` : ""}

    <div class="section-label">
      AI recommendations
      ${recs ? `<span class="section-label-count">${recs.length}</span>` : ""}
    </div>
    ${recs ? `
      <div>
        ${recs.map(r => `
          <div class="rec-card">
            <div class="rec-card-chips">
              <span class="badge badge-neutral">${esc(REC_KIND_LABELS[r.kind] || r.kind)}</span>
              <span class="badge badge-${r.risk === "high" ? "bad" : r.risk === "medium" ? "warn" : "good"}">${esc(r.risk)} risk</span>
              <span class="badge badge-info">confidence ${Math.round((r.confidence || 0) * 100)}%</span>
            </div>
            <div class="rec-card-title">${esc(r.title)}</div>
            <div class="rec-card-reason">${esc(r.reason)}</div>
            ${r.impact ? `<div class="rec-card-meta"><span class="rec-card-meta-label">Impact</span> · ${esc(r.impact)}</div>` : ""}
            ${r.target ? `<div class="rec-card-meta"><span class="rec-card-meta-label">Target</span> · ${esc(r.target.length > 100 ? r.target.slice(0, 100) + "…" : r.target)}</div>` : ""}
            ${r.deep_link ? `<div style="margin-top:10px"><a class="quick-action-btn" href="${esc(r.deep_link)}" target="_blank" style="display:inline-flex;width:auto;padding:6px 12px;font-size:12px"><span>Open in Google Ads</span><span class="quick-action-arrow">↗</span></a></div>` : ""}
          </div>
        `).join("")}
      </div>
    ` : `
      <div class="card empty-section">
        <div class="empty-section-icon">⊙</div>
        <div><strong>Pending AI fanout.</strong></div>
        <div style="margin-top:6px;font-size:12px">Per-account analysis runs against this account in the next batch. Top risks already identified: <span style="color:var(--ink-soft);font-weight:500">${a.top_risks.slice(0,3).map(r => esc(FACTOR_LABELS[r] || r)).join(" · ")}</span></div>
      </div>
    `}


    <div class="ops-section">
      <div class="section-label">Operator notes <span class="section-label-count" id="notes-count">0</span></div>
      <div class="ops-card">
        <div class="ops-card-header">
          <div>
            <div class="ops-card-title">Add a note to this account's audit trail</div>
            <div class="ops-card-sub">Saved instantly to your browser. Use "Sync to Drive" in Settings to push to the team.</div>
          </div>
        </div>
        <div class="ops-form">
          <textarea class="ops-textarea" id="note-input" placeholder="What did you see? e.g. 'Client confirmed Lauries Love is a Grants account — call scheduled Thursday 10am.'"></textarea>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="ops-btn ops-btn-primary" id="note-add-btn">Add note</button>
          <button class="ops-btn" id="note-clear-btn" type="button">Clear</button>
        </div>
        <div class="ops-list" id="notes-list"></div>
      </div>
    </div>

    <div class="ops-section">
      <div class="section-label">Report recipients <span class="section-label-count" id="recipients-count">0</span></div>
      <div class="ops-card">
        <div class="ops-card-header">
          <div>
            <div class="ops-card-title">Who gets this account's weekly report</div>
            <div class="ops-card-sub">Stored locally until you sync. The weekly-report send pipeline isn't live yet — these are for the cutover.</div>
          </div>
        </div>
        <div class="ops-form">
          <input type="email" class="ops-input" id="recipient-input" placeholder="client@example.com" />
          <button class="ops-btn ops-btn-primary" id="recipient-add-btn">Add</button>
        </div>
        <div class="ops-list" id="recipients-list"></div>
      </div>
    </div>

  `;

  // Build factor grid — plain-English headline per factor with status color.
  const factorOrder = [
    "cpa_trend", "conversion_trend", "conversion_rate_trend", "ctr_trend", "cpc_trend",
    "spend_efficiency", "budget_pacing", "search_term_waste",
    "campaign_status", "tracking_anomaly", "optimization_score"
  ];
  const STATUS_BADGE = {
    healthy:  { cls: "factor-status-healthy", text: "✓ healthy" },
    watch:    { cls: "factor-status-watch",   text: "⚠ watch" },
    problem:  { cls: "factor-status-problem", text: "● needs attention" },
    nodata:   { cls: "factor-status-nodata",  text: "— no data" }
  };
  document.getElementById("factor-grid").innerHTML = factorOrder.map(k => {
    const f = a.factor_inputs[k];
    if (!f) return "";
    const interp = interpretFactor(k, f);
    const badge = STATUS_BADGE[interp.status] || STATUS_BADGE.nodata;
    const cardCls = interp.status === "problem" ? "is-problem" : interp.status === "watch" ? "is-watch" : "";
    return `
      <div class="factor ${cardCls}">
        <div class="factor-status-row">
          <span class="factor-label">${esc(interp.label)}</span>
          <span class="factor-status ${badge.cls}">${esc(badge.text)}</span>
        </div>
        <div class="factor-headline">${esc(interp.headline)}</div>
        ${interp.detail ? `<div class="factor-detail">${esc(interp.detail)}</div>` : ""}
      </div>
    `;
  }).join("");

  // Wire up window selector
  document.querySelectorAll(".window-pill").forEach(p => {
    p.classList.toggle("active", p.dataset.window === currentWindow);
    p.addEventListener("click", () => setWindow(p.dataset.window));
  });

  renderKPIs();
}

  try { skyMountOps("google", account.customer_id, account.account_name); }
  catch(e) { console.error("ops mount failed", e); }

function renderKPIs() {
  if (!account) return;
  const m = account.m[currentWindow] || {cost:0, conv:0, cpa:null, clicks:0, convVal:0};
  const wl = WINDOW_LABELS[currentWindow];
  document.getElementById("lbl-spend").textContent = wl;
  document.getElementById("lbl-conv").textContent = wl;
  document.getElementById("lbl-cpa").textContent = wl;
  document.getElementById("kpi-spend").textContent = m.cost > 0 ? money(m.cost) : "—";
  document.getElementById("kpi-spend-hint").textContent = m.clicks > 0 ? num(m.clicks) + " clicks" : "No spend in window";
  document.getElementById("kpi-conv").textContent = m.conv > 0 ? num(Math.round(m.conv * 10) / 10) : "—";
  document.getElementById("kpi-conv-hint").textContent = m.convVal > 0 ? "Value " + money(m.convVal) : "—";
  document.getElementById("kpi-cpa").textContent = m.cpa != null ? money(m.cpa, true) : "—";
  // Compare CPA to target if available
  if (m.cpa != null && account.target_cpa > 0) {
    const ratio = m.cpa / account.target_cpa;
    const cls = ratio > 1.5 ? "kpi-hint-bad" : "";
    document.getElementById("kpi-cpa-hint").innerHTML = `<span class="${cls}">${ratio.toFixed(1)}x target (${money(account.target_cpa, true)})</span>`;
  } else {
    document.getElementById("kpi-cpa-hint").textContent = "No target CPA set";
  }
}

function setWindow(w) {
  currentWindow = w;
  try{ localStorage.setItem(STORAGE_KEY, w); }catch(e){}
  document.querySelectorAll(".window-pill").forEach(p => p.classList.toggle("active", p.dataset.window === w));
  renderKPIs();
}


// ============================================================
// Notes + Recipients module (audit response — Claude #5, #4)
// Stored in localStorage keyed by ${platform}_${customer_id}.
// Each note/recipient has a `synced` bool: false = pending sync to Drive.
// Sync UX lives on settings.html — copy-prompt-to-Claude pattern.
// ============================================================
const SKY_NOTES_KEY = "skyway.notes.v1";
const SKY_RECIPIENTS_KEY = "skyway.recipients.v1";

function skyLoadAll(key) {
  try { return JSON.parse(localStorage.getItem(key) || "[]"); }
  catch(e) { return []; }
}
function skySaveAll(key, arr) {
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}
function skyFmtTime(iso) {
  try {
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    const opts = sameDay
      ? { hour: "numeric", minute: "2-digit" }
      : { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" };
    return d.toLocaleString(undefined, opts);
  } catch(e) { return iso; }
}
function skyToast(msg) {
  let t = document.getElementById("ops-toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "ops-toast";
    t.className = "ops-toast";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add("is-shown");
  clearTimeout(window._skyToastTimer);
  window._skyToastTimer = setTimeout(() => t.classList.remove("is-shown"), 2200);
}

function skyMountOps(platform, customerId, accountName) {
  if (!platform || !customerId) return;

  // ---------- Notes ----------
  function renderNotes() {
    const all = skyLoadAll(SKY_NOTES_KEY);
    const mine = all.filter(n => n.account_id === customerId && n.platform === platform);
    mine.sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
    const countEl = document.getElementById("notes-count");
    if (countEl) countEl.textContent = String(mine.length);
    const listEl = document.getElementById("notes-list");
    if (!listEl) return;
    if (mine.length === 0) {
      listEl.innerHTML = '<div class="ops-list-empty">No notes yet. Add one above.</div>';
      return;
    }
    listEl.innerHTML = mine.map(n => `
      <div class="ops-note${n.synced ? "" : " is-unsaved"}">
        <div class="ops-note-meta">
          <div class="ops-note-time">
            ${n.synced ? "" : '<span class="ops-unsaved-dot" title="Not yet saved to Drive"></span>'}
            <span>${esc(skyFmtTime(n.created_at))}</span>
          </div>
          <button class="ops-btn ops-btn-sm ops-btn-danger" data-note-del="${esc(n.id)}">Delete</button>
        </div>
        <div class="ops-note-text">${esc(n.text)}</div>
      </div>
    `).join("");
    listEl.querySelectorAll("[data-note-del]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-note-del");
        const arr = skyLoadAll(SKY_NOTES_KEY);
        const next = arr.filter(n => n.id !== id);
        skySaveAll(SKY_NOTES_KEY, next);
        renderNotes();
        skyToast("Note deleted");
      });
    });
  }
  const noteInput = document.getElementById("note-input");
  const noteAdd = document.getElementById("note-add-btn");
  const noteClear = document.getElementById("note-clear-btn");
  if (noteAdd) {
    noteAdd.addEventListener("click", () => {
      const text = (noteInput.value || "").trim();
      if (!text) { noteInput.focus(); return; }
      const arr = skyLoadAll(SKY_NOTES_KEY);
      const note = {
        id: "note_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8),
        account_id: customerId,
        platform: platform,
        account_name: accountName || customerId,
        text: text,
        created_at: new Date().toISOString(),
        created_by: "Aaron Pilk",
        synced: false
      };
      arr.push(note);
      skySaveAll(SKY_NOTES_KEY, arr);
      noteInput.value = "";
      renderNotes();
      skyToast("Note saved locally · sync from Settings");
    });
  }
  if (noteClear) noteClear.addEventListener("click", () => { noteInput.value = ""; });
  renderNotes();

  // ---------- Recipients ----------
  function renderRecipients() {
    const all = skyLoadAll(SKY_RECIPIENTS_KEY);
    const mine = all.find(r => r.account_id === customerId && r.platform === platform);
    const emails = (mine && Array.isArray(mine.recipients)) ? mine.recipients : [];
    const isUnsaved = mine && mine.synced === false;
    const countEl = document.getElementById("recipients-count");
    if (countEl) countEl.textContent = String(emails.length);
    const listEl = document.getElementById("recipients-list");
    if (!listEl) return;
    if (emails.length === 0) {
      listEl.innerHTML = '<div class="ops-list-empty">No recipients on file. Add one above.</div>';
      return;
    }
    listEl.innerHTML = emails.map(em => `
      <div class="ops-recipient${isUnsaved ? " is-unsaved" : ""}">
        <span class="ops-recipient-email">
          ${isUnsaved ? '<span class="ops-unsaved-dot" title="Not yet saved to Drive"></span> ' : ""}
          ${esc(em)}
        </span>
        <button class="ops-btn ops-btn-sm ops-btn-danger" data-rcpt-del="${esc(em)}">Remove</button>
      </div>
    `).join("");
    listEl.querySelectorAll("[data-rcpt-del]").forEach(btn => {
      btn.addEventListener("click", () => {
        const em = btn.getAttribute("data-rcpt-del");
        const arr = skyLoadAll(SKY_RECIPIENTS_KEY);
        const idx = arr.findIndex(r => r.account_id === customerId && r.platform === platform);
        if (idx === -1) return;
        arr[idx].recipients = (arr[idx].recipients || []).filter(e => e !== em);
        arr[idx].updated_at = new Date().toISOString();
        arr[idx].synced = false;
        if (arr[idx].recipients.length === 0) arr.splice(idx, 1);
        skySaveAll(SKY_RECIPIENTS_KEY, arr);
        renderRecipients();
        skyToast("Recipient removed");
      });
    });
  }
  const rInput = document.getElementById("recipient-input");
  const rAdd = document.getElementById("recipient-add-btn");
  function addRecipient() {
    const em = (rInput.value || "").trim().toLowerCase();
    if (!em) { rInput.focus(); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
      skyToast("That doesn't look like a valid email");
      return;
    }
    const arr = skyLoadAll(SKY_RECIPIENTS_KEY);
    let entry = arr.find(r => r.account_id === customerId && r.platform === platform);
    if (!entry) {
      entry = {
        account_id: customerId,
        platform: platform,
        account_name: accountName || customerId,
        recipients: [],
        updated_at: new Date().toISOString(),
        synced: false
      };
      arr.push(entry);
    }
    if (!entry.recipients.includes(em)) {
      entry.recipients.push(em);
      entry.updated_at = new Date().toISOString();
      entry.synced = false;
    }
    skySaveAll(SKY_RECIPIENTS_KEY, arr);
    rInput.value = "";
    renderRecipients();
    skyToast("Recipient added locally · sync from Settings");
  }
  if (rAdd) rAdd.addEventListener("click", addRecipient);
  if (rInput) rInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addRecipient(); });
  renderRecipients();
}
</script>
